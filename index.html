<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Poker Manager Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--bg:#0b0f14;--bg2:#131a24;--bg3:#1a2332;--bg4:#243042;--felt:#1e5c3a;--felt2:#17472d;--felt3:#2a7a4e;--felt-light:rgba(30,92,58,.15);--green:#3a9d5e;--green2:#2d8049;--green-bg:rgba(58,157,94,.12);--gold:#d4a332;--gold2:#b8892a;--gold-bg:rgba(212,163,50,.12);--red:#c0392b;--red2:#a93226;--red-bg:rgba(192,57,43,.12);--blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);--text:#dce4ee;--text2:#8a9bb5;--text3:#5a6d85;--border:#253344;--radius:14px;--radius2:10px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:80px}input,button,select,textarea{font-family:inherit;font-size:inherit}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,#131a24,#0e1319);border-top:1px solid var(--border);display:flex;z-index:1000;padding:6px 0 env(safe-area-inset-bottom,8px)}.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;color:var(--text3);transition:.2s;gap:4px;font-size:10px;user-select:none}.nav-item.active{color:var(--gold)}.nav-item svg{width:22px;height:22px;transition:.2s}.nav-item.active svg{transform:scale(1.1)}.nav-item:active{transform:scale(.95)}
.page{display:none;padding:16px;padding-bottom:24px;animation:fadeIn .3s}.page.active{display:block}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sub-page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:900;overflow-y:auto;padding:16px;padding-bottom:90px;animation:slideUp .3s}.sub-page.active{display:block}.sub-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:8px 0}.sub-header h2{flex:1;font-size:18px}.btn-back{background:var(--bg3);border:none;color:var(--text);width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}.btn-back:active{transform:scale(.9)}
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:4px 0}.app-header h1{font-size:20px;display:flex;align-items:center;gap:8px}.app-header h1 span{font-size:24px}
.widget{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid var(--border);transition:.2s}.widget-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.widget-title{font-size:14px;color:var(--text2);display:flex;align-items:center;gap:6px}.widget-action{color:var(--gold);font-size:12px;cursor:pointer;background:none;border:none}
.widget.game-active{border:2px solid var(--green);box-shadow:0 0 12px rgba(58,157,94,.15);background:linear-gradient(135deg,rgba(30,92,58,.18),var(--bg2))}
.card{background:var(--bg3);border-radius:var(--radius2);padding:14px;margin-bottom:10px;border:1px solid transparent;transition:.2s;cursor:pointer}.card:active{transform:scale(.98);border-color:var(--border)}
.btn{padding:12px 24px;border-radius:var(--radius2);border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:active{transform:scale(.96)}.btn-primary{background:var(--felt);color:#fff}.btn-primary:hover{background:var(--felt2)}.btn-gold{background:var(--gold);color:#1a1a1a}.btn-gold:hover{background:var(--gold2)}.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:var(--red2)}.btn-secondary{background:var(--bg4);color:var(--text)}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-sm{padding:8px 16px;font-size:12px;border-radius:8px}.btn-block{width:100%;display:flex}.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.form-group{margin-bottom:16px}.form-label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}.form-input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:14px;outline:none;transition:.2s}.form-input:focus{border-color:var(--felt3)}.form-input::placeholder{color:var(--text3)}textarea.form-input{resize:vertical;min-height:80px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:1100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}.modal-overlay.active{display:flex}.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .3s;border:1px solid var(--border);border-bottom:none}.modal-handle{width:40px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}.modal h3{margin-bottom:16px;font-size:18px}
.stat-row{display:flex;gap:10px;margin-bottom:10px}.stat-box{flex:1;background:var(--bg3);border-radius:var(--radius2);padding:12px;text-align:center}.stat-value{font-size:20px;font-weight:700;margin-bottom:4px}.stat-label{font-size:11px;color:var(--text3)}.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.blue{color:var(--blue)}.stat-value.gold{color:var(--gold)}
.player-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg3);border-radius:var(--radius2);margin-bottom:8px;transition:.2s;cursor:pointer;border:1px solid transparent}.player-card:active{border-color:var(--border);transform:scale(.98)}.player-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:var(--gold);flex-shrink:0}.player-info{flex:1;min-width:0}.player-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.player-meta{font-size:11px;color:var(--text3);margin-top:2px}.player-amount{font-size:14px;font-weight:700;text-align:left;flex-shrink:0;direction:ltr}.player-amount.green{color:var(--green)}.player-amount.red{color:var(--red)}.player-amount.gray{color:var(--text3)}
.table-player{background:var(--bg3);border-radius:var(--radius2);padding:14px;margin-bottom:8px;border:1px solid transparent;transition:.3s}.table-player:not(.cashed-out){border:2px solid var(--green);box-shadow:0 0 12px rgba(58,157,94,.15)}.table-player.cashed-out{opacity:.6}.table-player.cashed-out.tp-win{border-right:3px solid var(--green);opacity:.8}.table-player.cashed-out.tp-lose{border-right:3px solid var(--red);opacity:.8}.table-player.cashed-out.tp-even{border-right:3px solid var(--text3);opacity:.8}
.tp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.tp-name{font-weight:600;font-size:15px}.tp-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}.tp-badge.active-badge{background:var(--felt-light);color:var(--green)}.tp-badge.out-badge{background:var(--bg4);color:var(--text3)}.tp-stats{display:flex;gap:16px;font-size:12px;color:var(--text2)}.tp-stat span{font-weight:600;color:var(--text)}.tp-profit{margin-top:6px;font-size:13px;font-weight:700}
.settlement-item{display:flex;align-items:center;gap:10px;padding:14px;background:var(--bg3);border-radius:var(--radius2);margin-bottom:8px}.settlement-arrow{color:var(--gold);font-size:18px}.settlement-amount{margin-right:auto;font-weight:700;color:var(--gold);font-size:15px;direction:ltr}
.slider-container{margin:16px 0}.amount-slider{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--bg4);outline:none}.amount-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 2px 8px rgba(212,163,50,.4)}.slider-value{text-align:center;font-size:24px;font-weight:700;margin:12px 0;direction:ltr;color:var(--gold)}
.quick-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.quick-amt{padding:10px 8px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;transition:.2s;text-align:center;white-space:nowrap}.quick-amt:active,.quick-amt.selected{background:var(--gold-bg);border-color:var(--gold);color:var(--gold)}
.search-box{position:relative;margin-bottom:16px}.search-box input{width:100%;padding:12px 14px 12px 40px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:14px;outline:none}.search-box input:focus{border-color:var(--felt3)}.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);width:18px;height:18px}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}.toggle-row:last-child{border-bottom:none}.toggle-label{font-size:14px}.toggle-desc{font-size:11px;color:var(--text3);margin-top:2px}.toggle{width:48px;height:26px;background:var(--bg4);border-radius:13px;position:relative;cursor:pointer;transition:.3s;flex-shrink:0}.toggle.on{background:var(--felt)}.toggle::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;right:2px;transition:.3s}.toggle.on::after{right:24px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}.chip-green{background:var(--green-bg);color:var(--green)}.chip-red{background:var(--red-bg);color:var(--red)}.chip-blue{background:var(--blue-bg);color:var(--blue)}.chip-gold{background:var(--gold-bg);color:var(--gold)}.chip-felt{background:var(--felt-light);color:var(--green)}
.timer{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;direction:ltr;text-align:center;letter-spacing:2px;color:var(--gold)}.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}.empty-state p{margin-bottom:16px}.divider{height:1px;background:var(--border);margin:16px 0}.section-title{font-size:13px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.datetime-widget{text-align:center;padding:20px}.datetime-time{font-size:42px;font-weight:700;direction:ltr;font-variant-numeric:tabular-nums;color:#fff}.datetime-date{font-size:14px;color:var(--text2);margin-top:4px}
.chart-container{position:relative;height:250px;margin:16px 0}.setting-item{padding:16px;background:var(--bg2);border-radius:var(--radius2);margin-bottom:10px;border:1px solid var(--border)}.setting-item h4{margin-bottom:4px;font-size:14px}.setting-item p{font-size:12px;color:var(--text3)}.info-box{background:var(--bg3);border-radius:var(--radius2);padding:12px;margin-bottom:12px}.info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}.info-row .label{color:var(--text3)}.info-row .value{font-weight:600;direction:ltr}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.num{direction:ltr;display:inline-block;font-variant-numeric:tabular-nums}
.selectable-player{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border-radius:var(--radius2);margin-bottom:6px;cursor:pointer;border:2px solid transparent;transition:.2s}.selectable-player.selected{border-color:var(--felt3);background:var(--felt-light)}.selectable-player:active{transform:scale(.98)}.sp-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;font-size:14px}.selectable-player.selected .sp-check{border-color:var(--green);background:var(--green);color:#fff}.sp-name{flex:1;font-size:14px;font-weight:500}.sp-buyin{font-size:12px;color:var(--text2);direction:ltr}
.felt-banner{background:linear-gradient(135deg,var(--felt2),var(--felt));border-radius:var(--radius);padding:20px;margin-bottom:14px;border:1px solid rgba(42,122,78,.3);text-align:center;color:#fff}.felt-banner h2{font-size:18px;margin-bottom:4px}.felt-banner p{font-size:13px;opacity:.85}
.analog-clock{width:140px;height:140px;border-radius:50%;position:relative;margin:12px auto;background:radial-gradient(circle,var(--bg3) 0%,var(--bg2) 100%);border:2px solid rgba(212,163,50,.25);box-shadow:0 0 20px rgba(0,0,0,.3),inset 0 0 15px rgba(0,0,0,.2)}.clock-tick{position:absolute;left:calc(50% - 1px);top:10px;width:2px;height:8px;background:var(--text3);border-radius:1px;transform-origin:1px 60px}.clock-tick-main{height:14px;width:2px;background:var(--gold);transform-origin:1px 60px}.clock-hand-h{position:absolute;left:calc(50% - 1.5px);bottom:50%;width:3px;height:28px;background:var(--text);border-radius:2px;transform-origin:50% 100%}.clock-hand-m{position:absolute;left:calc(50% - 1px);bottom:50%;width:2px;height:38px;background:var(--text2);border-radius:1px;transform-origin:50% 100%}.clock-hand-s{position:absolute;left:calc(50% - 0.5px);bottom:50%;width:1px;height:44px;background:var(--gold);transform-origin:50% 100%}.clock-center-dot{position:absolute;width:8px;height:8px;background:var(--gold);border-radius:50%;top:calc(50% - 4px);left:calc(50% - 4px);z-index:2;box-shadow:0 0 6px rgba(212,163,50,.5)}.clock-ring{position:absolute;width:120px;height:120px;border-radius:50%;border:1px solid rgba(212,163,50,.08);top:10px;left:10px}
.qa-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--bg3);border-radius:var(--radius2);padding:10px 12px}.qa-item input{flex:1;padding:8px 10px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;direction:ltr;outline:none}.qa-item input:focus{border-color:var(--felt3)}.qa-remove{width:30px;height:30px;border-radius:50%;background:var(--red-bg);border:none;color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.qa-remove:active{transform:scale(.9)}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;transition:.2s;white-space:nowrap}.filter-chip.active{background:var(--felt-light);border-color:var(--green);color:var(--green)}.filter-chip:active{transform:scale(.95)}
.balance-box{padding:14px;border-radius:var(--radius2);margin:12px 0;text-align:center;font-weight:600;font-size:14px}.balance-ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(58,157,94,.3)}.balance-warn{background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.3)}.commission-box{background:var(--gold-bg);border:1px solid rgba(212,163,50,.3);border-radius:var(--radius2);padding:14px;margin:12px 0;text-align:center}.commission-box .comm-label{font-size:12px;color:var(--gold2);margin-bottom:4px}.commission-box .comm-value{font-size:20px;font-weight:700;color:var(--gold);direction:ltr}
@media(min-width:500px){.page,.sub-page{max-width:500px;margin:0 auto}.modal{max-width:500px}}
</style>
</head>
<body>
<div id="page-dashboard" class="page active"><div class="app-header"><h1><span>🎰</span> پوکر منیجر</h1></div><div id="dashboard-content"></div></div>
<div id="page-table" class="page"><div id="table-content"></div></div>
<div id="page-players" class="page"><div class="app-header"><h1>👥 بازیکنان</h1><button class="btn btn-sm btn-primary" onclick="openAddPlayerModal()">+ جدید</button></div><div class="search-box"><input type="text" id="player-search" placeholder="جستجوی بازیکن..." oninput="renderPlayersPage()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><div id="players-list"></div></div>
<div id="page-history" class="page"><div class="app-header"><h1>📊 آمار و تاریخچه</h1></div><div id="history-content"></div></div>
<div id="page-settings" class="page"><div class="app-header"><h1>⚙️ تنظیمات</h1></div><div id="settings-content"></div></div>
<div id="sub-player-profile" class="sub-page"><div class="sub-header"><button class="btn-back" onclick="closeSubPage('sub-player-profile')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button><h2 id="profile-title">پروفایل</h2></div><div id="profile-content"></div></div>
<div id="sub-game-detail" class="sub-page"><div class="sub-header"><button class="btn-back" onclick="closeSubPage('sub-game-detail')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button><h2 id="game-detail-title">جزئیات</h2></div><div id="game-detail-content"></div></div>
<div id="sub-settlement" class="sub-page"><div class="sub-header"><button class="btn-back" onclick="closeSubPage('sub-settlement')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button><h2>تسویه حساب</h2></div><div id="settlement-content"></div></div>
<div id="sub-create-table" class="sub-page"><div class="sub-header"><button class="btn-back" onclick="closeSubPage('sub-create-table')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button><h2>ایجاد میز جدید</h2></div><div id="create-table-content"></div></div>
<div class="modal-overlay" id="modal-overlay" onclick="handleModalOverlayClick(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modal-handle"></div><div id="modal-content"></div></div></div>
<nav class="bottom-nav">
<div class="nav-item active" onclick="switchPage('dashboard')" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span>خانه</span></div>
<div class="nav-item" onclick="switchPage('table')" data-page="table"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v3"/></svg><span>میز</span></div>
<div class="nav-item" onclick="switchPage('players')" data-page="players"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>بازیکنان</span></div>
<div class="nav-item" onclick="switchPage('history')" data-page="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span>آمار</span></div>
<div class="nav-item" onclick="switchPage('settings')" data-page="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>تنظیمات</span></div>
</nav>
<script>
const DEFAULT_DATA={players:[],games:[],activeGameId:null,notes:'',settings:{currency:'تومان',defaultBuyIn:1000000,sliderMax:100000000,sliderStep:500000,quickAmounts:[500000,1000000,2000000,5000000,10000000,20000000],clockType:'analog',widgets:{topPlayers:true,statsSummary:true,notes:true,dateTime:true}}};
let data={};
let timerInterval=null,clockInterval=null;
let createTableState={location:'',defaultBuyIn:1000000,selectedPlayers:{},commission:{enabled:false,type:'fixed',fixedAmount:10000000,percentage:10,cap:100000000}};
let profileFilter='all';
let profileCustomStart=null;
let profileCustomEnd=null;
let currentProfilePlayerId=null;

function loadData(){try{const s=localStorage.getItem('pokerManagerData');if(s){data=JSON.parse(s);if(!data.settings)data.settings={...DEFAULT_DATA.settings};if(!data.settings.widgets)data.settings.widgets={...DEFAULT_DATA.settings.widgets};if(!data.settings.quickAmounts)data.settings.quickAmounts=[...DEFAULT_DATA.settings.quickAmounts];if(!data.settings.clockType)data.settings.clockType='analog';if(!data.settings.sliderStep||data.settings.sliderStep<500000)data.settings.sliderStep=500000;if(!data.settings.sliderMax||data.settings.sliderMax<100000000)data.settings.sliderMax=100000000;if(!data.players)data.players=[];if(!data.games)data.games=[];}else{data=JSON.parse(JSON.stringify(DEFAULT_DATA));}}catch(e){data=JSON.parse(JSON.stringify(DEFAULT_DATA));}}
function saveData(){localStorage.setItem('pokerManagerData',JSON.stringify(data))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function fmt(n){if(n===null||n===undefined)return'0';return Number(n).toLocaleString('en-US')}
function fmtSign(n){if(n>0)return'+'+fmt(n);if(n<0)return'-'+fmt(Math.abs(n));return'0'}
function getCurrency(){return data.settings.currency||'تومان'}
function getTimeStr(ts){if(!ts)return'--:--';return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}
function getDateStr(ts){if(!ts)return'';try{return new Date(ts).toLocaleDateString('fa-IR',{year:'numeric',month:'long',day:'numeric'})}catch(e){return new Date(ts).toLocaleDateString()}}
function getDateStrShort(ts){if(!ts)return'';try{return new Date(ts).toLocaleDateString('fa-IR',{month:'short',day:'numeric'})}catch(e){return new Date(ts).toLocaleDateString()}}
function getDateStrEn(ts){if(!ts)return'';return new Date(ts).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}
function elapsedStr(st){if(!st)return'00:00:00';const d=Math.floor((Date.now()-st)/1000);return`${String(Math.floor(d/3600)).padStart(2,'0')}:${String(Math.floor((d%3600)/60)).padStart(2,'0')}:${String(d%60).padStart(2,'0')}`}
function durationStr(s,e){if(!s||!e)return'--';const d=Math.floor((e-s)/1000);return`${Math.floor(d/3600)} ساعت و ${Math.floor((d%3600)/60)} دقیقه`}
function persianToFinglish(t){if(!t)return'';if(!/[\u0600-\u06FF]/.test(t))return t;const m={'ا':'a','آ':'a','ب':'b','پ':'p','ت':'t','ث':'s','ج':'j','چ':'ch','ح':'h','خ':'kh','د':'d','ذ':'z','ر':'r','ز':'z','ژ':'zh','س':'s','ش':'sh','ص':'s','ض':'z','ط':'t','ظ':'z','ع':'a','غ':'gh','ف':'f','ق':'gh','ک':'k','ك':'k','گ':'g','ل':'l','م':'m','ن':'n','و':'v','ه':'h','ی':'y','ي':'y','ئ':'y','ة':'h','ء':''};let r='';for(const c of t)r+=m[c]!==undefined?m[c]:c;return r.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ')}
function getActiveGame(){if(!data.activeGameId)return null;return data.games.find(g=>g.id===data.activeGameId)||null}
function getPlayerById(id){return data.players.find(p=>p.id===id)||null}

function getDateRange(filter){
const now=new Date();let start=null,end=null;
switch(filter){
case'tonight':{const d=new Date(now);d.setHours(18,0,0,0);if(now<d)d.setDate(d.getDate()-1);start=d.getTime();end=Date.now();break}
case'week':{const d=new Date(now);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);d.setHours(0,0,0,0);start=d.getTime();end=Date.now();break}
case'month':{const d=new Date(now.getFullYear(),now.getMonth(),1);start=d.getTime();end=Date.now();break}
case'year':{const d=new Date(now.getFullYear(),0,1);start=d.getTime();end=Date.now();break}
}return{start,end}}

function getPlayerStats(pid,startDate,endDate){
let tg=0,w=0,l=0,dr=0,tb=0,tc=0;const h=[];
data.games.filter(g=>g.status==='closed').forEach(g=>{
if(startDate&&g.startTime<startDate)return;
if(endDate&&g.startTime>endDate)return;
const gp=g.players.find(p=>p.playerId===pid);
if(gp&&gp.cashedOut){tg++;const b=gp.buyIns.reduce((s,x)=>s+x.amount,0);const c=gp.cashOutAmount||0;const pr=c-b;tb+=b;tc+=c;if(pr>0)w++;else if(pr<0)l++;else dr++;h.push({gameId:g.id,date:g.startTime,buyIn:b,cashOut:c,profit:pr})}});
return{totalGames:tg,wins:w,losses:l,draws:dr,totalBuyIn:tb,totalCashOut:tc,totalProfit:tc-tb,history:h}}

function getCommissionAmount(game){
if(!game||!game.commission||!game.commission.enabled)return 0;
const totalBI=game.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);
switch(game.commission.type){
case'fixed':return game.commission.fixedAmount||0;
case'percentage':return Math.round(totalBI*(game.commission.percentage||0)/100);
case'percentage_capped':{const calc=Math.round(totalBI*(game.commission.percentage||0)/100);return game.commission.cap>0?Math.min(calc,game.commission.cap):calc}
default:return 0}}

function getCommissionLabel(game){
if(!game||!game.commission||!game.commission.enabled)return'';
switch(game.commission.type){
case'fixed':return'ثابت: '+fmt(game.commission.fixedAmount)+' '+getCurrency();
case'percentage':return game.commission.percentage+'% از گردش';
case'percentage_capped':return game.commission.percentage+'% از گردش (سقف: '+fmt(game.commission.cap)+')';
default:return''}}

function switchPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.querySelector(`.nav-item[data-page="${p}"]`).classList.add('active');document.querySelectorAll('.sub-page').forEach(s=>s.classList.remove('active'));renderPage(p)}
function renderPage(p){switch(p){case'dashboard':renderDashboard();break;case'table':renderTablePage();break;case'players':renderPlayersPage();break;case'history':renderHistoryPage();break;case'settings':renderSettingsPage();break}}
function openSubPage(id){document.getElementById(id).classList.add('active')}
function closeSubPage(id){document.getElementById(id).classList.remove('active')}
function showModal(h){document.getElementById('modal-content').innerHTML=h;document.getElementById('modal-overlay').classList.add('active')}
function hideModal(){document.getElementById('modal-overlay').classList.remove('active')}
function handleModalOverlayClick(e){if(e.target===e.currentTarget)hideModal()}

function getAnalogClockHtml(){const now=new Date();const h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds();let ticks='';for(let i=0;i<12;i++)ticks+=`<div class="clock-tick ${i%3===0?'clock-tick-main':''}" style="transform:rotate(${i*30}deg)"></div>`;return`<div class="analog-clock"><div class="clock-ring"></div>${ticks}<div class="clock-hand-h" id="ach" style="transform:rotate(${h*30+m*0.5}deg)"></div><div class="clock-hand-m" id="acm" style="transform:rotate(${m*6}deg)"></div><div class="clock-hand-s" id="acs" style="transform:rotate(${s*6}deg)"></div><div class="clock-center-dot"></div></div>`}
function updateAnalogClock(){const now=new Date();const h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds();const ae=document.getElementById('ach'),be=document.getElementById('acm'),ce=document.getElementById('acs');if(ae)ae.style.transform=`rotate(${h*30+m*0.5}deg)`;if(be)be.style.transform=`rotate(${m*6}deg)`;if(ce)ce.style.transform=`rotate(${s*6}deg)`}

if(game.commission&&game.commission.enabled)html+=`<div style="margin-top:10px;font-size:12px;color:var(--gold);text-align:center">💰 کانیات: ${commLabel} = <span class="num">${fmt(commAmt)}</span> ${getCurrency()}</div>`;
html+=`</div>`}else{html+=`<div class="felt-banner"><div style="font-size:48px;margin-bottom:8px">🃏</div><h2>میز آماده است</h2><p style="margin-bottom:16px">برای شروع بازی یک میز جدید ایجاد کنید</p><button class="btn btn-gold" onclick="openCreateTablePage()" style="padding:14px 32px;font-size:15px">+ ایجاد میز جدید</button></div>`}
if(data.settings.widgets.dateTime){const isA=data.settings.clockType==='analog';html+=`<div class="widget datetime-widget"><div class="widget-title" style="justify-content:center;margin-bottom:8px">📅 تاریخ و زمان</div>${isA?getAnalogClockHtml():`<div class="datetime-time" id="dash-clock">${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}</div>`}<div class="datetime-date" style="margin-top:${isA?'12':'4'}px">${getDateStr(Date.now())}</div></div>`}
if(data.settings.widgets.statsSummary){const cg=data.games.filter(g=>g.status==='closed');const tm=cg.reduce((s,g)=>s+g.players.reduce((ss,p)=>ss+p.buyIns.reduce((sss,b)=>sss+b.amount,0),0),0);let bw=0;cg.forEach(g=>g.players.forEach(p=>{if(p.cashedOut){const pr=(p.cashOutAmount||0)-p.buyIns.reduce((s,b)=>s+b.amount,0);if(pr>bw)bw=pr}}));html+=`<div class="widget"><div class="widget-header"><span class="widget-title">📈 خلاصه آمار</span></div><div class="stat-row"><div class="stat-box"><div class="stat-value blue">${fmt(cg.length)}</div><div class="stat-label">کل بازی‌ها</div></div><div class="stat-box"><div class="stat-value gold">${fmt(data.players.length)}</div><div class="stat-label">بازیکنان</div></div></div><div class="stat-row"><div class="stat-box"><div class="stat-value">${fmt(tm)}</div><div class="stat-label">پول در گردش (${getCurrency()})</div></div><div class="stat-box"><div class="stat-value green">${fmt(bw)}</div><div class="stat-label">بزرگترین برد</div></div></div></div>`}
if(data.settings.widgets.topPlayers){const ranked=data.players.map(p=>({...p,stats:getPlayerStats(p.id)})).filter(p=>p.stats.totalGames>0).sort((a,b)=>b.stats.totalProfit-a.stats.totalProfit).slice(0,5);html+=`<div class="widget"><div class="widget-header"><span class="widget-title">🏆 برترین بازیکنان</span><button class="widget-action" onclick="switchPage('players')">نمایش همه ←</button></div>`;if(!ranked.length)html+=`<p style="text-align:center;color:var(--text3);font-size:13px;padding:16px">هنوز بازی‌ای انجام نشده</p>`;else ranked.forEach((p,i)=>{const pc=p.stats.totalProfit>0?'green':p.stats.totalProfit<0?'red':'gray';html+=`<div class="player-card" onclick="openPlayerProfile('${p.id}')"><div class="player-avatar">${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)}</div><div class="player-info"><div class="player-name">${p.name}</div><div class="player-meta">${p.stats.totalGames} بازی · ${p.stats.totalGames>0?Math.round(p.stats.wins/p.stats.totalGames*100):0}% برد</div></div><div class="player-amount ${pc}"><span class="num">${fmtSign(p.stats.totalProfit)}</span></div></div>`});html+=`</div>`}
if(data.settings.widgets.notes){html+=`<div class="widget"><div class="widget-header"><span class="widget-title">📝 یادداشت‌ها</span></div><textarea class="form-input" placeholder="یادداشت‌ها..." oninput="data.notes=this.value;saveData()" style="min-height:100px">${data.notes||''}</textarea></div>`}
el.innerHTML=html;startDashboardTimers()}

function startDashboardTimers(){if(clockInterval)clearInterval(clockInterval);clockInterval=setInterval(()=>{const c=document.getElementById('dash-clock');if(c)c.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});updateAnalogClock();const t=document.getElementById('dash-timer');const g=getActiveGame();if(t&&g)t.textContent=elapsedStr(g.startTime)},1000)}

function renderTablePage(){const el=document.getElementById('table-content');const game=getActiveGame();
if(!game){el.innerHTML=`<div class="empty-state" style="padding-top:60px"><div style="font-size:64px;margin-bottom:16px">🃏</div><h2 style="margin-bottom:8px;color:var(--text)">میز خالی است</h2><p>برای شروع یک میز جدید ایجاد کنید</p><button class="btn btn-gold btn-block" onclick="openCreateTablePage()" style="margin-top:16px">+ ایجاد میز جدید</button></div>`;return}
const totalBI=game.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);
const totalCO=game.players.filter(p=>p.cashedOut).reduce((s,p)=>s+(p.cashOutAmount||0),0);
const active=game.players.filter(p=>!p.cashedOut).length;
const allOut=game.players.length>0&&game.players.every(p=>p.cashedOut);
const commAmt=getCommissionAmount(game);
const commLabel=getCommissionLabel(game);

let html=`<div class="widget" style="margin-bottom:14px;border:2px solid var(--green);box-shadow:0 0 12px rgba(58,157,94,.15);background:linear-gradient(135deg,rgba(30,92,58,.12),var(--bg2))"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px"><div><div style="font-size:12px;color:var(--text3)">📅 ${getDateStr(game.startTime)}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">🕐 شروع: <span class="num">${getTimeStr(game.startTime)}</span>${game.location?' · 📍 '+game.location:''}</div></div><span class="chip chip-felt"><span class="live-dot" style="margin-left:4px"></span> در جریان</span></div><div class="timer" id="table-timer">${elapsedStr(game.startTime)}</div><div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-danger btn-sm" style="flex:1" onclick="confirmEndGame()">⏹ پایان بازی</button></div></div>`;

html+=`<div class="stat-row"><div class="stat-box"><div class="stat-value blue">${game.players.length}</div><div class="stat-label">کل بازیکنان</div></div><div class="stat-box"><div class="stat-value green">${active}</div><div class="stat-label">سر میز</div></div></div><div class="stat-row"><div class="stat-box"><div class="stat-value"><span class="num">${fmt(totalBI)}</span></div><div class="stat-label">کل خرید (${getCurrency()})</div></div><div class="stat-box"><div class="stat-value"><span class="num">${fmt(totalCO)}</span></div><div class="stat-label">کل خروجی</div></div></div>`;

if(game.commission&&game.commission.enabled){
html+=`<div class="commission-box"><div class="comm-label">💰 کانیات میز (${commLabel})</div><div class="comm-value"><span class="num">${fmt(commAmt)}</span> ${getCurrency()}</div><div style="font-size:11px;color:var(--text3);margin-top:4px">از کل گردش <span class="num">${fmt(totalBI)}</span></div></div>`}

html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px"><span class="section-title" style="margin:0">بازیکنان سر میز</span><button class="btn btn-sm btn-primary" onclick="openAddToTableModal()">+ افزودن</button></div>`;
if(!game.players.length)html+=`<div class="empty-state"><p>هنوز بازیکنی اضافه نشده</p></div>`;
else{[...game.players].sort((a,b)=>(a.cashedOut?1:0)-(b.cashedOut?1:0)).forEach(p=>{const tb=p.buyIns.reduce((s,b)=>s+b.amount,0);let pH='',eC='';if(p.cashedOut){const pr=(p.cashOutAmount||0)-tb;eC='cashed-out '+(pr>0?'tp-win':pr<0?'tp-lose':'tp-even');pH=`<div class="tp-profit" style="color:var(--${pr>0?'green':pr<0?'red':'text3'})">${pr>0?'+':''}${fmt(pr)} ${getCurrency()}</div>`}html+=`<div class="table-player ${eC}" onclick="openPlayerActionModal('${p.odId}')"><div class="tp-top"><span class="tp-name">${p.name}</span><span class="tp-badge ${p.cashedOut?'out-badge':'active-badge'}">${p.cashedOut?'خارج شده':'فعال'}</span></div><div class="tp-stats"><span class="tp-stat">خرید: <span class="num">${fmt(tb)}</span></span><span class="tp-stat">دفعات: <span>${p.buyIns.length}</span></span>${p.cashedOut?`<span class="tp-stat">خروج: <span class="num">${fmt(p.cashOutAmount)}</span></span>`:''}</div>${pH}</div>`})}

if(allOut&&game.players.length>0){

let balHtml='';

el.innerHTML=html;startTableTimer()}

function confirmEndGame(){const g=getActiveGame();if(!g)return;

const diff=totalBI-totalCO-commAmt;
let balHtml='';

else if(diff>0)balHtml=`<div class="balance-box balance-warn">⚠️ <span class="num">${fmt(diff)}</span> ${getCurrency()} پول کم آمده!</div>`;
else balHtml=`<div class="balance-box balance-warn">⚠️ <span class="num">${fmt(Math.abs(diff))}</span> ${getCurrency()} پول اضافه خارج شده!</div>`;
let commHtml='';

showModal(`<h3>⏹ پایان بازی</h3>${infoHtml}${commHtml}${balHtml}<p style="margin:16px 0 16px;text-align:center;color:var(--text2)">آیا بازی را پایان می‌دهید؟</p><div class="btn-group" style="flex-direction:column"><button class="btn btn-danger btn-block" onclick="endGame()">بله، پایان بازی</button><button class="btn btn-secondary btn-block" onclick="hideModal()">انصراف</button></div>`)}

function calculateSettlements(game){
const results=[];
game.players.forEach(p=>{const tb=p.buyIns.reduce((s,b)=>s+b.amount,0);results.push({name:p.name,playerId:p.playerId,buyIn:tb,cashOut:p.cashOutAmount||0,profit:(p.cashOutAmount||0)-tb})});
const debtors=[],creditors=[];
results.forEach(r=>{if(r.profit<0)debtors.push({name:r.name,amount:Math.abs(r.profit)});else if(r.profit>0)creditors.push({name:r.name,amount:r.profit})});
debtors.sort((a,b)=>b.amount-a.amount);creditors.sort((a,b)=>b.amount-a.amount);
const settlements=[];let i=0,j=0;
while(i<debtors.length&&j<creditors.length){const amt=Math.min(debtors[i].amount,creditors[j].amount);if(amt>0)settlements.push({from:debtors[i].name,to:creditors[j].name,amount:amt});debtors[i].amount-=amt;creditors[j].amount-=amt;if(debtors[i].amount<=0)i++;if(creditors[j].amount<=0)j++}
return{results,settlements}}

function showSettlement(gid){const game=data.games.find(g=>g.id===gid);if(!game)return;
const{results,settlements}=calculateSettlements(game);
const totalBI=game.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);
const totalCO=game.players.reduce((s,p)=>s+(p.cashOutAmount||0),0);
const commAmt=getCommissionAmount(game);
const diff=totalBI-totalCO-commAmt;

let html=`<div class="widget"><div class="widget-header"><span class="widget-title">📊 نتایج</span></div><div class="info-box"><div class="info-row"><span class="label">تاریخ</span><span class="value">${getDateStr(game.startTime)}</span></div><div class="info-row"><span class="label">مدت</span><span class="value">${durationStr(game.startTime,game.endTime)}</span></div>${game.location?`<div class="info-row"><span class="label">مکان</span><span class="value">${game.location}</span></div>`:''}<div class="info-row"><span class="label">کل ورودی</span><span class="value num">${fmt(totalBI)} ${getCurrency()}</span></div><div class="info-row"><span class="label">کل خروجی</span><span class="value num">${fmt(totalCO)} ${getCurrency()}</span></div>`;
if(game.commission&&game.commission.enabled)html+=`<div class="info-row"><span class="label">💰 کانیات (${getCommissionLabel(game)})</span><span class="value num" style="color:var(--gold)">${fmt(commAmt)} ${getCurrency()}</span></div>`;
html+=`</div>`;

if(diff===0)html+=`<div class="balance-box balance-ok">✅ حساب‌ها دقیقاً منطبق است</div>`;
else if(diff>0)html+=`<div class="balance-box balance-warn">⚠️ هشدار: <span class="num">${fmt(diff)}</span> ${getCurrency()} پول کم آمده (روی میز مانده)</div>`;
else html+=`<div class="balance-box balance-warn">⚠️ هشدار: <span class="num">${fmt(Math.abs(diff))}</span> ${getCurrency()} پول اضافه خارج شده!</div>`;
html+=`</div>`;

if(game.commission&&game.commission.enabled){
html+=`<div class="commission-box"><div class="comm-label">💰 کانیات صاحب میز</div><div class="comm-value"><span class="num">${fmt(commAmt)}</span> ${getCurrency()}</div><div style="font-size:11px;color:var(--text3);margin-top:4px">${getCommissionLabel(game)} · از کل گردش <span class="num">${fmt(totalBI)}</span></div></div>`}

html+=`<div class="section-title">عملکرد</div>`;
results.sort((a,b)=>b.profit-a.profit).forEach(r=>{const pc=r.profit>0?'green':r.profit<0?'red':'gray';html+=`<div class="player-card"><div class="player-avatar" style="color:var(--${r.profit>0?'green':r.profit<0?'red':'text3'})">${r.profit>0?'▲':r.profit<0?'▼':'●'}</div><div class="player-info"><div class="player-name">${r.name}</div><div class="player-meta">خرید: <span class="num">${fmt(r.buyIn)}</span> · خروج: <span class="num">${fmt(r.cashOut)}</span></div></div><div class="player-amount ${pc}"><span class="num">${fmtSign(r.profit)}</span></div></div>`});

function generatePDF(gid){const game=data.games.find(g=>g.id===gid);if(!game)return;const{jsPDF}=window.jspdf;const doc=new jsPDF();const{results,settlements}=calculateSettlements(game);const commAmt=getCommissionAmount(game);const totalBI=game.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);const totalCO=game.players.reduce((s,p)=>s+(p.cashOutAmount||0),0);const diff=totalBI-totalCO-commAmt;

if(settlements.length>0){doc.setFontSize(14);doc.setFont('helvetica','bold');doc.text('Settlements',20,y);y+=8;const sd=settlements.map(s=>[persianToFinglish(s.from),'-->',persianToFinglish(s.to),fmt(s.amount)]);doc.autoTable({startY:y,head:[['From','','To','Amount']],body:sd,theme:'grid',headStyles:{fillColor:[212,163,50],textColor:0,fontStyle:'bold'},styles:{halign:'center',fontSize:10}})}
doc.setFontSize(8);doc.setFont('helvetica','italic');doc.text('Poker Manager Pro v1.3',105,doc.internal.pageSize.height-10,{align:'center'});doc.save(`poker-${getDateStrEn(game.startTime).replace(/[^a-zA-Z0-9]/g,'-')}.pdf`)}

html+=`<div class="setting-item"><h4>⚡ دکمه‌های مبلغ سریع</h4><p style="margin-bottom:12px">مبالغ میانبر زیر لغزاننده</p><div id="qa-list">`;s.quickAmounts.forEach((a,i)=>{html+=`<div class="qa-item"><input type="number" value="${a}" style="direction:ltr" onchange="updateQuickAmount(${i},parseInt(this.value))"><button class="qa-remove" onclick="removeQuickAmount(${i})">×</button></div>`});html+=`</div><div style="display:flex;gap:8px;margin-top:10px"><input class="form-input" id="new-qa-value" type="number" placeholder="مبلغ جدید..." style="direction:ltr;flex:1"><button class="btn btn-primary btn-sm" onclick="addQuickAmount()">+ افزودن</button></div><div style="margin-top:12px"><span class="form-label">پیش‌نمایش:</span><div class="quick-amounts" style="margin-top:6px">${s.quickAmounts.map(a=>`<span class="quick-amt" style="cursor:default">${fmt(a)}</span>`).join('')}</div></div></div>`;
html+=`<div class="setting-item"><h4>💾 مدیریت داده‌ها</h4><p>بکاپ و بازگردانی</p><div class="btn-group" style="margin-top:12px;flex-direction:column"><button class="btn btn-secondary btn-block" onclick="exportData()">📤 خروجی بکاپ</button><button class="btn btn-secondary btn-block" onclick="document.getElementById('import-file').click()">📥 ورود بکاپ</button><input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)"><button class="btn btn-danger btn-block btn-sm" onclick="resetAllData()">🗑 حذف تمام داده‌ها</button></div></div>`;
html+=`<div class="setting-item" style="text-align:center"><div style="font-size:48px;margin-bottom:8px">🎰</div><h4>Poker Manager Pro</h4><p style="margin-top:4px">Version 1.3</p></div><div style="height:40px"></div>`;el.innerHTML=html}

function toggleWidget(k,el){data.settings.widgets[k]=!data.settings.widgets[k];el.classList.toggle('on');saveData()}
function toggleClockType(el){data.settings.clockType=data.settings.clockType==='analog'?'digital':'analog';el.classList.toggle('on');saveData()}
function updateQuickAmount(idx,val){if(val>0){data.settings.quickAmounts[idx]=val;data.settings.quickAmounts.sort((a,b)=>a-b);saveData();renderSettingsPage()}}
function removeQuickAmount(idx){if(data.settings.quickAmounts.length<=1){alert('حداقل یک مبلغ');return}data.settings.quickAmounts.splice(idx,1);saveData();renderSettingsPage()}
function addQuickAmount(){const v=parseInt(document.getElementById('new-qa-value').value);if(!v||v<=0){alert('مبلغ معتبر نیست');return}if(data.settings.quickAmounts.includes(v)){alert('تکراری');return}data.settings.quickAmounts.push(v);data.settings.quickAmounts.sort((a,b)=>a-b);saveData();renderSettingsPage()}
function exportData(){const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`poker-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u)}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const imp=JSON.parse(ev.target.result);if(imp.players&&imp.games){if(confirm('جایگزین شود؟')){data=imp;saveData();location.reload()}}else alert('نامعتبر')}catch(er){alert('خطا')}};r.readAsText(f);e.target.value=''}
function resetAllData(){if(!confirm('حذف همه؟'))return;if(!confirm('غیرقابل بازگشت!'))return;localStorage.removeItem('pokerManagerData');location.reload()}

loadData();renderDashboard();
</script>
</body>
</html>

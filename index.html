<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Poker Manager Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#252d3a;
--green:#22c55e;--green2:#16a34a;--green-bg:rgba(34,197,94,.12);
--red:#ef4444;--red2:#dc2626;--red-bg:rgba(239,68,68,.12);
--blue:#3b82f6;--blue-bg:rgba(59,130,246,.12);
--yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.12);
--purple:#a855f7;
--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
--border:#2d3748;--radius:14px;--radius2:10px;
--shadow:0 4px 20px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:80px}
input,button,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* Navigation */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:1000;padding:6px 0 env(safe-area-inset-bottom,8px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;color:var(--text3);transition:.2s;gap:4px;font-size:10px;user-select:none}
.nav-item.active{color:var(--green)}
.nav-item svg{width:22px;height:22px;transition:.2s}
.nav-item.active svg{transform:scale(1.1)}
.nav-item:active{transform:scale(.95)}

/* Pages */
.page{display:none;padding:16px;padding-bottom:24px;animation:fadeIn .3s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}

/* Sub Pages */
.sub-page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:900;overflow-y:auto;padding:16px;padding-bottom:90px;animation:slideUp .3s}
.sub-page.active{display:block}
.sub-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:8px 0}
.sub-header h2{flex:1;font-size:18px}
.btn-back{background:var(--bg3);border:none;color:var(--text);width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-back:active{transform:scale(.9)}

/* Header */
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:4px 0}
.app-header h1{font-size:20px;display:flex;align-items:center;gap:8px}
.app-header h1 span{font-size:24px}

/* Widgets */
.widget{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid var(--border);transition:.2s}
.widget-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.widget-title{font-size:14px;color:var(--text2);display:flex;align-items:center;gap:6px}
.widget-action{color:var(--blue);font-size:12px;cursor:pointer;background:none;border:none}
.widget.game-active{border-color:var(--green);background:linear-gradient(135deg,rgba(34,197,94,.08),var(--bg2))}

/* Cards */
.card{background:var(--bg3);border-radius:var(--radius2);padding:14px;margin-bottom:10px;border:1px solid transparent;transition:.2s;cursor:pointer}
.card:active{transform:scale(.98);border-color:var(--border)}
.card.dimmed{opacity:.5;pointer-events:none}
.card.win{border-right:3px solid var(--green)}
.card.lose{border-right:3px solid var(--red)}
.card.even{border-right:3px solid var(--text3)}

/* Buttons */
.btn{padding:12px 24px;border-radius:var(--radius2);border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--green);color:#000}
.btn-primary:hover{background:var(--green2)}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--bg4);color:var(--text)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:8px 16px;font-size:12px;border-radius:8px}
.btn-block{width:100%;display:flex}
.btn-icon{width:42px;height:42px;padding:0;border-radius:50%}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* Inputs */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:14px;outline:none;transition:.2s}
.form-input:focus{border-color:var(--green)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:80px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:slideUp .3s;border:1px solid var(--border);border-bottom:none}
.modal-handle{width:40px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}
.modal h3{margin-bottom:16px;font-size:18px}

/* Stats */
.stat-row{display:flex;gap:10px;margin-bottom:10px}
.stat-box{flex:1;background:var(--bg3);border-radius:var(--radius2);padding:12px;text-align:center}
.stat-value{font-size:20px;font-weight:700;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--text3)}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.blue{color:var(--blue)}
.stat-value.yellow{color:var(--yellow)}

/* Player Card Table */
.player-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg3);border-radius:var(--radius2);margin-bottom:8px;transition:.2s;cursor:pointer;border:1px solid transparent}
.player-card:active{border-color:var(--border);transform:scale(.98)}
.player-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:var(--green);flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-meta{font-size:11px;color:var(--text3);margin-top:2px}
.player-amount{font-size:14px;font-weight:700;text-align:left;flex-shrink:0;direction:ltr}
.player-amount.green{color:var(--green)}
.player-amount.red{color:var(--red)}
.player-amount.gray{color:var(--text3)}

/* Table Player Card */
.table-player{background:var(--bg3);border-radius:var(--radius2);padding:14px;margin-bottom:8px;border:1px solid transparent;transition:.3s}
.table-player.cashed-out{opacity:.6}
.table-player.cashed-out.tp-win{border-right:3px solid var(--green);opacity:.8}
.table-player.cashed-out.tp-lose{border-right:3px solid var(--red);opacity:.8}
.table-player.cashed-out.tp-even{border-right:3px solid var(--text3);opacity:.8}
.tp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tp-name{font-weight:600;font-size:15px}
.tp-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}
.tp-badge.active-badge{background:var(--green-bg);color:var(--green)}
.tp-badge.out-badge{background:var(--bg4);color:var(--text3)}
.tp-stats{display:flex;gap:16px;font-size:12px;color:var(--text2)}
.tp-stat span{font-weight:600;color:var(--text)}
.tp-profit{margin-top:6px;font-size:13px;font-weight:700}

/* Settlement */
.settlement-item{display:flex;align-items:center;gap:10px;padding:14px;background:var(--bg3);border-radius:var(--radius2);margin-bottom:8px}
.settlement-arrow{color:var(--yellow);font-size:18px}
.settlement-amount{margin-right:auto;font-weight:700;color:var(--yellow);font-size:15px;direction:ltr}

/* Slider */
.slider-container{margin:16px 0}
.amount-slider{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--bg4);outline:none;transition:.2s}
.amount-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--green);cursor:pointer;box-shadow:0 2px 8px rgba(34,197,94,.4)}
.slider-value{text-align:center;font-size:24px;font-weight:700;margin:12px 0;direction:ltr}

/* Quick Amount Buttons */
.quick-amounts{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.quick-amt{padding:8px 14px;background:var(--bg4);border:1px solid var(--border);border-radius:20px;color:var(--text);cursor:pointer;font-size:12px;transition:.2s;white-space:nowrap}
.quick-amt:active,.quick-amt.selected{background:var(--green-bg);border-color:var(--green);color:var(--green)}

/* Search */
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 14px 12px 40px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:14px;outline:none}
.search-box input:focus{border-color:var(--green)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);width:18px;height:18px}

/* Toggle */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:14px}
.toggle-desc{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{width:48px;height:26px;background:var(--bg4);border-radius:13px;position:relative;cursor:pointer;transition:.3s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;right:2px;transition:.3s}
.toggle.on::after{right:24px}

/* Chip/Tag */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.chip-green{background:var(--green-bg);color:var(--green)}
.chip-red{background:var(--red-bg);color:var(--red)}
.chip-blue{background:var(--blue-bg);color:var(--blue)}

/* Timer */
.timer{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;direction:ltr;text-align:center;letter-spacing:2px}

/* Empty State */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.empty-state p{margin-bottom:16px}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px 0}

/* Section Title */
.section-title{font-size:13px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}

/* Date Time Widget */
.datetime-widget{text-align:center;padding:20px}
.datetime-time{font-size:42px;font-weight:700;direction:ltr;font-variant-numeric:tabular-nums}
.datetime-date{font-size:14px;color:var(--text2);margin-top:4px}

/* Chart Container */
.chart-container{position:relative;height:250px;margin:16px 0}

/* Settings Item */
.setting-item{padding:16px;background:var(--bg2);border-radius:var(--radius2);margin-bottom:10px;border:1px solid var(--border)}
.setting-item h4{margin-bottom:4px;font-size:14px}
.setting-item p{font-size:12px;color:var(--text3)}

/* Info Box */
.info-box{background:var(--bg3);border-radius:var(--radius2);padding:12px;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.info-row .label{color:var(--text3)}
.info-row .value{font-weight:600;direction:ltr}

/* Notification Badge */
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Number formatting */
.num{direction:ltr;display:inline-block;font-variant-numeric:tabular-nums}

/* Responsive */
@media(min-width:500px){
  .page,.sub-page{max-width:500px;margin:0 auto}
  .modal{max-width:500px}
}
</style>
</head>
<body>

<!-- ======================== PAGES ======================== -->

<!-- Dashboard Page -->
<div id="page-dashboard" class="page active">
  <div class="app-header">
    <h1><span>🎰</span> پوکر منیجر</h1>
  </div>
  <div id="dashboard-content"></div>
</div>

<!-- Table Page -->
<div id="page-table" class="page">
  <div id="table-content"></div>
</div>

<!-- Players Page -->
<div id="page-players" class="page">
  <div class="app-header">
    <h1>👥 بازیکنان</h1>
    <button class="btn btn-sm btn-primary" onclick="openAddPlayerModal()">+ جدید</button>
  </div>
  <div class="search-box">
    <input type="text" id="player-search" placeholder="جستجوی بازیکن..." oninput="renderPlayersPage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </div>
  <div id="players-list"></div>
</div>

<!-- History Page -->
<div id="page-history" class="page">
  <div class="app-header">
    <h1>📊 آمار و تاریخچه</h1>
  </div>
  <div id="history-content"></div>
</div>

<!-- Settings Page -->
<div id="page-settings" class="page">
  <div class="app-header">
    <h1>⚙️ تنظیمات</h1>
  </div>
  <div id="settings-content"></div>
</div>

<!-- ======================== SUB-PAGES ======================== -->

<div id="sub-player-profile" class="sub-page">
  <div class="sub-header">
    <button class="btn-back" onclick="closeSubPage('sub-player-profile')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </button>
    <h2 id="profile-title">پروفایل بازیکن</h2>
  </div>
  <div id="profile-content"></div>
</div>

<div id="sub-game-detail" class="sub-page">
  <div class="sub-header">
    <button class="btn-back" onclick="closeSubPage('sub-game-detail')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </button>
    <h2 id="game-detail-title">جزئیات بازی</h2>
  </div>
  <div id="game-detail-content"></div>
</div>

<div id="sub-settlement" class="sub-page">
  <div class="sub-header">
    <button class="btn-back" onclick="closeSubPage('sub-settlement')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </button>
    <h2>تسویه حساب</h2>
  </div>
  <div id="settlement-content"></div>
</div>

<!-- ======================== MODAL ======================== -->
<div class="modal-overlay" id="modal-overlay" onclick="handleModalOverlayClick(event)">
  <div class="modal" id="modal-body" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- ======================== BOTTOM NAV ======================== -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchPage('dashboard')" data-page="dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    <span>خانه</span>
  </div>
  <div class="nav-item" onclick="switchPage('table')" data-page="table">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v3"/></svg>
    <span>میز</span>
  </div>
  <div class="nav-item" onclick="switchPage('players')" data-page="players">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span>بازیکنان</span>
  </div>
  <div class="nav-item" onclick="switchPage('history')" data-page="history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    <span>آمار</span>
  </div>
  <div class="nav-item" onclick="switchPage('settings')" data-page="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <span>تنظیمات</span>
  </div>
</nav>

<script>
// ======================= DATA LAYER =======================
const DEFAULT_DATA = {
  players: [],
  games: [],
  activeGameId: null,
  notes: '',
  settings: {
    currency: 'تومان',
    defaultBuyIn: 1000000,
    sliderMax: 20000000,
    sliderStep: 100000,
    quickAmounts: [500000, 1000000, 2000000, 5000000, 10000000, 20000000],
    widgets: { topPlayers: true, statsSummary: true, notes: true, dateTime: true }
  }
};

let data = {};
let timerInterval = null;
let clockInterval = null;

function loadData() {
  try {
    const saved = localStorage.getItem('pokerManagerData');
    if (saved) {
      data = JSON.parse(saved);
      // merge defaults for missing fields
      if (!data.settings) data.settings = {...DEFAULT_DATA.settings};
      if (!data.settings.widgets) data.settings.widgets = {...DEFAULT_DATA.settings.widgets};
      if (!data.settings.quickAmounts) data.settings.quickAmounts = [...DEFAULT_DATA.settings.quickAmounts];
      if (!data.players) data.players = [];
      if (!data.games) data.games = [];
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveData() {
  localStorage.setItem('pokerManagerData', JSON.stringify(data));
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

// ======================= UTILS =======================
function fmt(n) {
  if (n === null || n === undefined) return '0';
  return Number(n).toLocaleString('en-US');
}

function fmtSign(n) {
  if (n > 0) return '+' + fmt(n);
  if (n < 0) return '-' + fmt(Math.abs(n));
  return '0';
}

function getCurrency() { return data.settings.currency || 'تومان'; }

function getTimeStr(ts) {
  if (!ts) return '--:--';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function getDateStr(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  try {
    return d.toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' });
  } catch(e) {
    return d.toLocaleDateString();
  }
}

function getDateStrShort(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  try {
    return d.toLocaleDateString('fa-IR', { month: 'short', day: 'numeric' });
  } catch(e) {
    return d.toLocaleDateString();
  }
}

function getDateStrEn(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function elapsedStr(startTs) {
  if (!startTs) return '00:00:00';
  const diff = Math.floor((Date.now() - startTs) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function durationStr(startTs, endTs) {
  if (!startTs || !endTs) return '--';
  const diff = Math.floor((endTs - startTs) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  return `${h} ساعت و ${m} دقیقه`;
}

function persianToFinglish(text) {
  if (!text) return '';
  if (!/[\u0600-\u06FF\u0750-\u077F]/.test(text)) return text;
  const map = {'ا':'a','آ':'a','ب':'b','پ':'p','ت':'t','ث':'s','ج':'j','چ':'ch','ح':'h','خ':'kh','د':'d','ذ':'z','ر':'r','ز':'z','ژ':'zh','س':'s','ش':'sh','ص':'s','ض':'z','ط':'t','ظ':'z','ع':'a','غ':'gh','ف':'f','ق':'gh','ک':'k','ك':'k','گ':'g','ل':'l','م':'m','ن':'n','و':'v','ه':'h','ی':'y','ي':'y','ئ':'y','ة':'h','ء':'','ِ':'e','َ':'a','ُ':'o'};
  let result = '';
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (map[c] !== undefined) result += map[c];
    else result += c;
  }
  // Capitalize first letter of each word
  return result.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

function getActiveGame() {
  if (!data.activeGameId) return null;
  return data.games.find(g => g.id === data.activeGameId) || null;
}

function getPlayerById(id) {
  return data.players.find(p => p.id === id) || null;
}

function getPlayerStats(playerId) {
  let totalGames = 0, wins = 0, losses = 0, draws = 0, totalBuyIn = 0, totalCashOut = 0;
  const history = [];
  data.games.filter(g => g.status === 'closed').forEach(g => {
    const gp = g.players.find(p => p.playerId === playerId);
    if (gp && gp.cashedOut) {
      totalGames++;
      const buyIn = gp.buyIns.reduce((s, b) => s + b.amount, 0);
      const cashOut = gp.cashOutAmount || 0;
      const profit = cashOut - buyIn;
      totalBuyIn += buyIn;
      totalCashOut += cashOut;
      if (profit > 0) wins++;
      else if (profit < 0) losses++;
      else draws++;
      history.push({ gameId: g.id, date: g.startTime, buyIn, cashOut, profit });
    }
  });
  return { totalGames, wins, losses, draws, totalBuyIn, totalCashOut, totalProfit: totalCashOut - totalBuyIn, history };
}

function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
  // Close any open sub-pages
  document.querySelectorAll('.sub-page').forEach(s => s.classList.remove('active'));
  renderPage(page);
}

function renderPage(page) {
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'table': renderTablePage(); break;
    case 'players': renderPlayersPage(); break;
    case 'history': renderHistoryPage(); break;
    case 'settings': renderSettingsPage(); break;

}

  const game = {

// ======================= ADD PLAYER TO TABLE =======================
function openAddToTableModal() {
  const game = getActiveGame();
  if (!game) return;
  
  const existingIds = game.players.map(p => p.playerId);
  const available = data.players.filter(p => !existingIds.includes(p.id));
  
  let html = `<h3>➕ افزودن بازیکن</h3>`;
  
  html += `<div class="form-group">
    <label class="form-label">ایجاد بازیکن جدید</label>
    <div style="display:flex;gap:8px">
      <input class="form-input" id="new-player-name-table" placeholder="نام بازیکن" style="flex:1">
      <button class="btn btn-primary btn-sm" onclick="addNewPlayerToTable()">افزودن</button>
    </div>
  </div>`;

  if (available.length > 0) {
    html += `<div class="divider"></div><label class="form-label">بازیکنان ذخیره شده</label>`;
    available.forEach(p => {
      html += `<div class="player-card" onclick="addExistingPlayerToTable('${p.id}')">
        <div class="player-avatar">${p.name.charAt(0)}</div>
        <div class="player-info"><div class="player-name">${p.name}</div></div>
        <span style="color:var(--green);font-size:13px">+ افزودن</span>
      </div>`;
    });
  }
  
  showModal(html);
}

function addExistingPlayerToTable(playerId) {
  const game = getActiveGame();
  if (!game) return;
  const player = getPlayerById(playerId);
  if (!player) return;
  if (game.players.find(p => p.playerId === playerId)) return;
  
  hideModal();
  openBuyInModal(playerId, player.name, true);
}

function addNewPlayerToTable() {
  const nameInput = document.getElementById('new-player-name-table');
  const name = nameInput.value.trim();
  if (!name) return;
  
  // Check if player exists
  let player = data.players.find(p => p.name.toLowerCase() === name.toLowerCase());
  if (!player) {
    player = { id: genId(), name: name };
    data.players.push(player);
    saveData();
  }
  
  const game = getActiveGame();
  if (game.players.find(p => p.playerId === player.id)) {
    alert('این بازیکن قبلاً اضافه شده');
    return;
  }
  
  hideModal();
  openBuyInModal(player.id, player.name, true);
}

function openBuyInModal(playerId, playerName, isInitial) {
  const game = getActiveGame();
  const defaultAmt = game ? game.defaultBuyIn : data.settings.defaultBuyIn;
  const s = data.settings;
  
  let html = `<h3>💰 ${isInitial ? 'ورودی' : 'خرید مجدد'} - ${playerName}</h3>
    <div class="slider-value" id="buyin-display">${fmt(defaultAmt)} ${getCurrency()}</div>
    <div class="slider-container">
      <input type="range" class="amount-slider" id="buyin-slider" min="0" max="${s.sliderMax}" step="${s.sliderStep}" value="${defaultAmt}" oninput="updateBuyInDisplay()">
    </div>
    <div class="quick-amounts">`;
  s.quickAmounts.forEach(a => {
    html += `<button class="quick-amt" onclick="setBuyInAmount(${a})">${fmt(a)}</button>`;
  });
  html += `</div>
    <div class="form-group" style="margin-top:12px">
      <label class="form-label">یا مبلغ دلخواه (${getCurrency()})</label>
      <input class="form-input" id="buyin-custom" type="number" placeholder="مبلغ دلخواه" style="direction:ltr" oninput="syncBuyInSlider()">
    </div>
    <button class="btn btn-primary btn-block" onclick="confirmBuyIn('${playerId}','${playerName}',${isInitial})">✅ تأیید خرید</button>`;
  
  showModal(html);
}

function updateBuyInDisplay() {
  const v = parseInt(document.getElementById('buyin-slider').value);
  document.getElementById('buyin-display').textContent = fmt(v) + ' ' + getCurrency();
  document.getElementById('buyin-custom').value = '';
}

function setBuyInAmount(amt) {
  document.getElementById('buyin-slider').value = Math.min(amt, data.settings.sliderMax);
  document.getElementById('buyin-display').textContent = fmt(amt) + ' ' + getCurrency();
  document.getElementById('buyin-custom').value = amt;
}

function syncBuyInSlider() {
  const v = parseInt(document.getElementById('buyin-custom').value) || 0;
  document.getElementById('buyin-slider').value = Math.min(v, data.settings.sliderMax);
  document.getElementById('buyin-display').textContent = fmt(v) + ' ' + getCurrency();
}

function confirmBuyIn(playerId, playerName, isInitial) {
  const custom = document.getElementById('buyin-custom').value;
  const slider = document.getElementById('buyin-slider').value;
  const amount = parseInt(custom) || parseInt(slider) || 0;
  if (amount <= 0) { alert('مبلغ باید بیشتر از صفر باشد'); return; }
  
  const game = getActiveGame();
  if (!game) return;
  
  if (isInitial) {
    game.players.push({
      odId: genId(),
      playerId: playerId,
      name: playerName,
      buyIns: [{ amount: amount, time: Date.now() }],
      cashedOut: false,
      cashOutAmount: null,
      cashOutTime: null
    });
  } else {
    const gp = game.players.find(p => p.playerId === playerId);
    if (gp) {
      gp.buyIns.push({ amount: amount, time: Date.now() });
      gp.cashedOut = false;
      gp.cashOutAmount = null;
      gp.cashOutTime = null;
    }
  }
  
  saveData();
  hideModal();
  renderTablePage();
}

// ======================= SETTLEMENT =======================
function calculateSettlements(game) {
  const results = [];
  game.players.forEach(p => {
    const totalBuy = p.buyIns.reduce((s,b) => s + b.amount, 0);
    const cashOut = p.cashOutAmount || 0;
    results.push({ name: p.name, buyIn: totalBuy, cashOut: cashOut, profit: cashOut - totalBuy });
  });
  
  const debtors = [];
  const creditors = [];
  results.forEach(r => {
    if (r.profit < 0) debtors.push({ name: r.name, amount: Math.abs(r.profit) });
    else if (r.profit > 0) creditors.push({ name: r.name, amount: r.profit });
  });
  
  debtors.sort((a,b) => b.amount - a.amount);
  creditors.sort((a,b) => b.amount - a.amount);
  
  const settlements = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const amt = Math.min(debtors[i].amount, creditors[j].amount);
    if (amt > 0) {
      settlements.push({ from: debtors[i].name, to: creditors[j].name, amount: amt });
    }
    debtors[i].amount -= amt;
    creditors[j].amount -= amt;
    if (debtors[i].amount <= 0) i++;
    if (creditors[j].amount <= 0) j++;
  }
  
  return { results, settlements };
}

function showSettlement(gameId) {
  const game = data.games.find(g => g.id === gameId);
  if (!game) return;
  
  const { results, settlements } = calculateSettlements(game);
  
  let html = `<div class="widget">
    <div class="widget-header"><span class="widget-title">📊 نتایج بازی</span></div>

      ${game.location?`<div class="info-row"><span class="label">مکان</span><span class="value">${game.location}</span></div>`:''}
    </div>
  </div>`;
  
  html += `<div class="section-title">عملکرد بازیکنان</div>`;
  results.sort((a,b) => b.profit - a.profit).forEach(r => {
    const pClass = r.profit > 0 ? 'green' : r.profit < 0 ? 'red' : 'gray';
    html += `<div class="player-card">

      </div>

  });
  
  if (settlements.length > 0) {
    html += `<div class="section-title" style="margin-top:20px">💸 تسویه حساب</div>
      <p style="font-size:12px;color:var(--text3);margin-bottom:10px">چه کسی به چه کسی باید پرداخت کند:</p>`;
    settlements.forEach(s => {

        <span class="settlement-amount"><span class="num">${fmt(s.amount)}</span> ${getCurrency()}</span>

  html += `<div style="margin-top:20px">

    <button class="btn btn-outline btn-block" onclick="closeSubPage('sub-settlement')">بستن</button>

// ======================= PDF EXPORT =======================
function generatePDF(gameId) {
  const game = data.games.find(g => g.id === gameId);
  if (!game) return;
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const { results, settlements } = calculateSettlements(game);
  
  let y = 20;
  doc.setFontSize(20);
  doc.setFont('helvetica', 'bold');
  doc.text('Poker Game Report', 105, y, { align: 'center' });
  y += 15;
  
  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.text(`Date: ${getDateStrEn(game.startTime)}`, 20, y); y += 7;
  doc.text(`Start: ${getTimeStr(game.startTime)}`, 20, y);
  if (game.endTime) { doc.text(`End: ${getTimeStr(game.endTime)}`, 100, y); }
  y += 7;
  if (game.location) { doc.text(`Location: ${persianToFinglish(game.location)}`, 20, y); y += 7; }
  doc.text(`Players: ${game.players.length}`, 20, y); y += 7;
  
  const totalBuyIns = game.players.reduce((s,p) => s + p.buyIns.reduce((ss,b) => ss + b.amount, 0), 0);
  doc.text(`Total Buy-ins: ${fmt(totalBuyIns)}`, 20, y); y += 12;
  
  // Player Results Table
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('Player Results', 20, y); y += 8;
  
  const tableData = results.sort((a,b) => b.profit - a.profit).map(r => [
    persianToFinglish(r.name),
    fmt(r.buyIn),
    fmt(r.cashOut),
    (r.profit >= 0 ? '+' : '') + fmt(r.profit),
    r.profit > 0 ? 'WIN' : r.profit < 0 ? 'LOSS' : 'EVEN'
  ]);
  
  doc.autoTable({
    startY: y,
    head: [['Player', 'Buy-in', 'Cash-out', 'Profit/Loss', 'Result']],
    body: tableData,
    theme: 'grid',
    headStyles: { fillColor: [34, 197, 94], textColor: 0, fontStyle: 'bold' },
    styles: { halign: 'center', fontSize: 10 },
    columnStyles: { 0: { halign: 'left' } }
  });
  
  y = doc.lastAutoTable.finalY + 15;
  
  // Settlements
  if (settlements.length > 0) {
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text('Settlements', 20, y); y += 8;
    
    const settleData = settlements.map(s => [
      persianToFinglish(s.from),
      '-->',
      persianToFinglish(s.to),
      fmt(s.amount)
    ]);
    
    doc.autoTable({
      startY: y,
      head: [['From', '', 'To', 'Amount']],
      body: settleData,
      theme: 'grid',
      headStyles: { fillColor: [245, 158, 11], textColor: 0, fontStyle: 'bold' },
      styles: { halign: 'center', fontSize: 10 }
    });
  }
  
  // Footer
  const pageHeight = doc.internal.pageSize.height;
  doc.setFontSize(8);
  doc.setFont('helvetica', 'italic');
  doc.text('Generated by Poker Manager Pro v1.2', 105, pageHeight - 10, { align: 'center' });
  
  doc.save(`poker-game-${getDateStrEn(game.startTime).replace(/[^a-zA-Z0-9]/g,'-')}.pdf`);
}

function renderHistoryChart(games) {
  const canvas = document.getElementById('history-chart');
  if (!canvas || games.length === 0) return;
  
  // Group by month
  const monthData = {};
  games.forEach(g => {
    const d = new Date(g.startTime);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!monthData[key]) monthData[key] = { count: 0, totalMoney: 0 };
    monthData[key].count++;
    monthData[key].totalMoney += g.players.reduce((s,p) => s + p.buyIns.reduce((ss,b) => ss + b.amount, 0), 0);
  });
  
  const labels = Object.keys(monthData).sort();
  const counts = labels.map(k => monthData[k].count);
  const money = labels.map(k => monthData[k].totalMoney);
  
  // If chart already exists, destroy it
  if (window.historyChart) window.historyChart.destroy();
  
  window.historyChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'تعداد بازی',
        data: counts,
        backgroundColor: 'rgba(34,197,94,0.6)',
        borderColor: '#22c55e',
        borderWidth: 1,
        borderRadius: 6,
        yAxisID: 'y'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#94a3b8' } }
      },
      scales: {
        x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(45,55,72,0.5)' } },
        y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(45,55,72,0.5)' } }
      }
    }
  });
}

// ======================= GAME DETAIL =======================
function openGameDetail(gameId) {
  const game = data.games.find(g => g.id === gameId);
  if (!game) return;
  
  const { results, settlements } = calculateSettlements(game);
  const totalBuyIns = game.players.reduce((s,p) => s + p.buyIns.reduce((ss,b) => ss + b.amount, 0), 0);
  const totalCashOuts = game.players.reduce((s,p) => s + (p.cashOutAmount || 0), 0);
  
  document.getElementById('game-detail-title').textContent = 'بازی ' + getDateStrShort(game.startTime);
  
  let html = `<div class="widget">
    <div class="info-box">
      <div class="info-row"><span class="label">📅 تاریخ</span><span class="value">${getDateStr(game.startTime)}</span></div>
      <div class="info-row"><span class="label">🕐 شروع</span><span class="value num">${getTimeStr(game.startTime)}</span></div>
      ${game.endTime?`<div class="info-row"><span class="label">🕐 پایان</span><span class="value num">${getTimeStr(game.endTime)}</span></div>`:''}
      <div class="info-row"><span class="label">⏱ مدت</span><span class="value">${durationStr(game.startTime, game.endTime)}</span></div>
      ${game.location?`<div class="info-row"><span class="label">📍 مکان</span><span class="value">${game.location}</span></div>`:''}
    </div>
    <div class="stat-row" style="margin-top:10px">
      <div class="stat-box"><div class="stat-value blue">${game.players.length}</div><div class="stat-label">بازیکنان</div></div>
      <div class="stat-box"><div class="stat-value"><span class="num">${fmt(totalBuyIns)}</span></div><div class="stat-label">کل خرید</div></div>
      <div class="stat-box"><div class="stat-value"><span class="num">${fmt(totalCashOuts)}</span></div><div class="stat-label">کل خروج</div></div>
    </div>
  </div>`;
  
  html += `<div class="section-title">عملکرد بازیکنان</div>`;
  results.sort((a,b) => b.profit - a.profit).forEach(r => {
    const pClass = r.profit > 0 ? 'green' : r.profit < 0 ? 'red' : 'gray';
    html += `<div class="player-card" onclick="openPlayerProfile('${(data.players.find(p=>p.name===r.name)||{}).id||''}')">
      <div class="player-avatar" style="color:var(--${r.profit>0?'green':r.profit<0?'red':'text3'})">${r.profit>0?'▲':r.profit<0?'▼':'●'}</div>
      <div class="player-info"><div class="player-name">${r.name}</div><div class="player-meta">خرید: <span class="num">${fmt(r.buyIn)}</span> · خروج: <span class="num">${fmt(r.cashOut)}</span></div></div>
      <div class="player-amount ${pClass}"><span class="num">${fmtSign(r.profit)}</span></div>
    </div>`;
  });
  
  if (settlements.length > 0) {
    html += `<div class="section-title" style="margin-top:16px">💸 تسویه حساب</div>`;
    settlements.forEach(s => {
      html += `<div class="settlement-item">
        <span style="font-weight:600;color:var(--red)">${s.from}</span>
        <span class="settlement-arrow">→</span>
        <span style="font-weight:600;color:var(--green)">${s.to}</span>
        <span class="settlement-amount"><span class="num">${fmt(s.amount)}</span></span>
      </div>`;
    });
  }
  
  html += `<div style="margin-top:20px">
    <button class="btn btn-secondary btn-block" onclick="generatePDF('${gameId}')">📄 دانلود PDF</button>
  </div>`;
  
  document.getElementById('game-detail-content').innerHTML = html;
  openSubPage('sub-game-detail');
}

// ======================= SETTINGS PAGE =======================

        <option value="ریال" ${s.currency==='ریال'?'selected':''}>ریال</option>

        <option value="یورو" ${s.currency==='یورو'?'selected':''}>یورو</option>

    <!-- Dashboard Widgets -->

      <div style="margin-top:8px">
        <div class="toggle-row">
          <div><span class="toggle-label">🏆 برترین بازیکنان</span></div>
          <div class="toggle ${s.widgets.topPlayers?'on':''}" onclick="toggleWidget('topPlayers',this)"></div>
        </div>

        </div>
        <div class="toggle-row">
          <div><span class="toggle-label">📝 یادداشت‌ها</span></div>
          <div class="toggle ${s.widgets.notes?'on':''}" onclick="toggleWidget('notes',this)"></div>
        </div>
        <div class="toggle-row">
          <div><span class="toggle-label">📅 تاریخ و زمان</span></div>
          <div class="toggle ${s.widgets.dateTime?'on':''}" onclick="toggleWidget('dateTime',this)"></div>
        </div>
      </div>
    </div>
    
    <!-- Buy-in Settings -->
    <div class="setting-item">
      <h4>💰 تنظیمات خرید</h4>
      <div class="form-group" style="margin-top:8px">
        <label class="form-label">مبلغ پیش‌فرض ورودی</label>
        <input class="form-input" type="number" value="${s.defaultBuyIn}" style="direction:ltr" onchange="data.settings.defaultBuyIn=parseInt(this.value)||0;saveData()">
      </div>
      <div class="form-group">
        <label class="form-label">سقف اسلایدر</label>
        <input class="form-input" type="number" value="${s.sliderMax}" style="direction:ltr" onchange="data.settings.sliderMax=parseInt(this.value)||20000000;saveData()">
      </div>
      <div class="form-group">
        <label class="form-label">گام اسلایدر</label>
        <input class="form-input" type="number" value="${s.sliderStep}" style="direction:ltr" onchange="data.settings.sliderStep=parseInt(this.value)||100000;saveData()">
      </div>
    </div>
    
    <!-- Quick Amounts -->
    <div class="setting-item">
      <h4>⚡ دکمه‌های مبلغ سریع</h4>
      <p>مبالغ دکمه‌های میانبر (با کاما جدا کنید)</p>
      <input class="form-input" id="quick-amounts-input" style="margin-top:8px;direction:ltr" value="${s.quickAmounts.join(',')}" onchange="saveQuickAmounts(this.value)">
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
        ${s.quickAmounts.map(a => `<span class="chip chip-blue">${fmt(a)}</span>`).join('')}

    <div class="setting-item">

      <div class="btn-group" style="margin-top:12px;flex-direction:column">
        <button class="btn btn-secondary btn-block" onclick="exportData()">📤 خروجی بکاپ (Export)</button>

        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">

function toggleWidget(key, el) {
  data.settings.widgets[key] = !data.settings.widgets[key];
  el.classList.toggle('on');
  saveData();
}

function saveQuickAmounts(val) {
  const amounts = val.split(',').map(v => parseInt(v.trim())).filter(v => v > 0);
  if (amounts.length > 0) {
    data.settings.quickAmounts = amounts;
    saveData();
    renderSettingsPage();
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `poker-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.players && imported.games) {
        if (confirm('آیا مطمئنید؟ داده‌های فعلی جایگزین می‌شوند.')) {
          data = imported;
          saveData();
          location.reload();
        }
      } else {
        alert('فایل معتبر نیست');
      }
    } catch(err) {
      alert('خطا در خواندن فایل');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAllData() {
  if (!confirm('آیا مطمئنید؟ تمام داده‌ها حذف خواهند شد!')) return;
  if (!confirm('این عمل غیرقابل بازگشت است. ادامه می‌دهید؟')) return;
  localStorage.removeItem('pokerManagerData');
  location.reload();
}

// ======================= INITIALIZATION =======================
function init() {
  loadData();
  renderDashboard();
}

init();
</script>

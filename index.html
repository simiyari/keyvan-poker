<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="پوکر پرو">
<title>مدیریت پوکر</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg0:#080c10;--bg1:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#222d3d;
--grn1:#0d4420;--grn2:#1a6b35;--grn3:#2ea043;--grn4:#3fb950;
--gld:#d4a017;--gld2:#f0c040;--red:#da3633;--red2:#f85149;--blu:#58a6ff;
--tx1:#e6edf3;--tx2:#8b949e;--tx3:#484f58;--brd:#21262d;--brd2:#30363d;
--rad:12px;--rads:8px;--nav:64px;--hdr:52px
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,'Segoe UI',Tahoma,sans-serif;background:var(--bg0);color:var(--tx1);overflow:hidden;touch-action:manipulation;direction:rtl}
#app{display:flex;flex-direction:column;height:100%}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{display:none;padding:20px;padding-bottom:calc(var(--nav)+24px);min-height:100%}
.page.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.nav{height:var(--nav);background:var(--bg2);border-top:1px solid var(--brd);display:flex;align-items:center;justify-content:space-around;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;cursor:pointer;color:var(--tx3);border:none;background:none;font-size:10px;font-weight:600;font-family:inherit;transition:color .2s}
.nav-item.active{color:var(--grn4)}
.nav-item .ni{font-size:22px;line-height:1}
.card{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rad);padding:16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border-radius:var(--rads);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:active{opacity:.7}
.btn-p{background:var(--grn2);color:#fff}
.btn-d{background:var(--red);color:#fff}
.btn-s{background:var(--bg3);color:var(--tx1);border:1px solid var(--brd2)}
.btn-g{background:var(--gld);color:#000}
.btn-w{width:100%}
.btn-l{padding:15px 30px;font-size:16px}
.btn-sm{padding:8px 14px;font-size:12px}
input,select{width:100%;padding:11px 14px;background:var(--bg1);border:1px solid var(--brd2);border-radius:var(--rads);color:var(--tx1);font-size:16px;font-family:inherit;outline:none;direction:rtl;text-align:right}
input:focus,select:focus{border-color:var(--grn3)}
input[type=number]{direction:ltr;text-align:left}
select{-webkit-appearance:none;appearance:none}
.fl{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:5px}
.fg{margin-bottom:14px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;justify-content:center;align-items:center;padding:16px}
.modal-bg.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rad);width:100%;max-width:500px;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mh{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--brd)}
.mh h3{font-size:16px;font-weight:700}
.mx{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:none;border-radius:50%;color:var(--tx2);font-size:18px;cursor:pointer}
.mb{padding:18px}
.mf{padding:14px 18px;border-top:1px solid var(--brd);display:flex;gap:10px;justify-content:flex-start}
.overlay{display:none;position:fixed;inset:0;background:var(--bg0);z-index:900;overflow-y:auto;-webkit-overflow-scrolling:touch}
.overlay.on{display:block;animation:fadeUp .2s ease}
.oh{height:var(--hdr);background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:10}
.oh button{background:none;border:none;color:var(--tx1);font-size:20px;cursor:pointer;padding:6px}
.oh h3{font-size:16px;font-weight:600}
.oc{padding:20px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.si{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rads);padding:12px;text-align:center}
.sv{font-size:18px;font-weight:700;margin-bottom:3px;direction:ltr}
.sl{font-size:11px;color:var(--tx2)}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.b-g{background:rgba(46,160,67,.15);color:var(--grn4)}
.b-r{background:rgba(218,54,51,.15);color:var(--red2)}
.b-b{background:rgba(88,166,255,.15);color:var(--blu)}
.b-y{background:rgba(212,160,23,.15);color:var(--gld2)}
.p-pos{color:var(--grn4)}.p-neg{color:var(--red2)}.p-zero{color:var(--tx2)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0}
.pi{display:flex;align-items:center;gap:12px;padding:11px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rads);margin-bottom:7px;cursor:pointer;transition:background .15s}
.pi:active{background:var(--bg4)}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:14px;font-weight:600}
.pi-sub{font-size:12px;color:var(--tx2)}
.pi-val{text-align:left;font-weight:700;font-size:14px;direction:ltr}
.timer{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px;direction:ltr}
.gs{background:linear-gradient(135deg,var(--grn1),#0a2e1a);border:1px solid var(--grn2);border-radius:var(--rad);padding:22px;margin-bottom:18px}
.gs.off{background:var(--bg3);border-color:var(--brd)}
.rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.r1{background:#ffd700;color:#000}.r2{background:#c0c0c0;color:#000}.r3{background:#cd7f32;color:#fff}
.abar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{text-align:right;padding:9px 10px;background:var(--bg3);color:var(--tx2);font-weight:700;font-size:11px;border-bottom:1px solid var(--brd)}
.dt td{padding:9px 10px;border-bottom:1px solid var(--brd)}
.empty{text-align:center;padding:40px 16px;color:var(--tx2)}
.empty .ei{font-size:42px;margin-bottom:12px;opacity:.4}
.empty h3{font-size:16px;margin-bottom:6px;color:var(--tx1)}
.search{position:relative;margin-bottom:14px}
.search input{padding-right:40px}
.search .sic{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--tx2);font-size:16px}
.cb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rads);margin-bottom:5px;cursor:pointer}
.cb-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--grn3)}
.st{font-size:15px;font-weight:700;margin:20px 0 10px;display:flex;align-items:center;gap:6px}
.st:first-child{margin-top:0}
hr.div{border:none;border-top:1px solid var(--brd);margin:18px 0}
.toast-c{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{padding:10px 20px;border-radius:var(--rads);font-size:13px;font-weight:600;color:#fff;animation:tIn .3s ease;max-width:320px;text-align:center}
.t-ok{background:var(--grn2)}.t-err{background:var(--red)}.t-info{background:#1a5276}
@keyframes tIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.gc{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rad);padding:14px;margin-bottom:10px;cursor:pointer;transition:background .15s}
.gc:active{background:var(--bg4)}
.chart-box{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rad);padding:14px;margin-bottom:14px}
.chart-box canvas{width:100%!important;height:200px!important}
.stg-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rads);margin-bottom:5px}
.toggle{position:relative;width:44px;height:26px;cursor:pointer;flex-shrink:0}
.toggle input{display:none}
.toggle span{position:absolute;inset:0;background:var(--brd2);border-radius:13px;transition:.3s}
.toggle span::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+span{background:var(--grn3)}
.toggle input:checked+span::before{transform:translateX(18px)}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.flex-b{display:flex;justify-content:space-between;align-items:center}
.mt-12{margin-top:12px}.mb-12{margin-bottom:12px}.mb-8{margin-bottom:8px}
.tx-c{text-align:center}

.qa-grid{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.qa-btn{padding:8px 14px;background:var(--bg4);border:1px solid var(--brd2);border-radius:var(--rads);color:var(--tx1);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;direction:ltr}
.qa-btn:active,.qa-btn.sel{background:var(--grn2);border-color:var(--grn3);color:#fff}

.slider-wrap{margin:6px 0;padding:4px 0}
.slider-wrap input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:var(--brd2);border-radius:3px;outline:none;direction:ltr}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--grn3);cursor:pointer;border:3px solid var(--bg2)}
.slider-val{text-align:center;font-size:24px;font-weight:700;margin:8px 0;font-variant-numeric:tabular-nums;direction:ltr;color:var(--grn4)}

.preset-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg4);border:1px solid var(--brd2);border-radius:14px;font-size:12px;color:var(--tx1);margin:2px;direction:ltr}
.preset-tag .ptx{cursor:pointer;color:var(--red2);margin-right:4px;font-size:14px}

/* Table Player Cards */
.tpc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px}
.tpc{background:linear-gradient(145deg,var(--bg3),var(--bg2));border:1px solid var(--brd2);border-radius:var(--rad);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tpc:active{transform:scale(.97)}
.tpc::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 var(--rad) var(--rad) 0}
.tpc.playing::before{background:var(--grn3)}
.tpc.out::before{background:var(--red)}
.tpc.out{opacity:.55}
.tpc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.tpc-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;border:2px solid var(--brd2)}
.tpc.playing .tpc-avatar{border-color:var(--grn3)}
.tpc.out .tpc-avatar{border-color:var(--red)}
.tpc-name{font-size:15px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tpc-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.tpc-playing{background:rgba(46,160,67,.2);color:var(--grn4)}
.tpc-out{background:rgba(218,54,51,.2);color:var(--red2)}
.tpc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.tpc-stat{text-align:center;padding:6px;background:rgba(0,0,0,.2);border-radius:6px}
.tpc-stat-val{font-size:14px;font-weight:700;direction:ltr;font-variant-numeric:tabular-nums}
.tpc-stat-lbl{font-size:9px;color:var(--tx2);margin-top:1px}
.tpc-actions{display:flex;gap:6px;margin-top:10px}
.tpc-actions .btn{flex:1;padding:7px 4px;font-size:11px}
.tpc-net{font-size:16px;font-weight:800;text-align:center;margin-top:8px;direction:ltr}

.qa-section{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
@media(min-width:768px){
.page{padding:24px 36px;padding-bottom:calc(var(--nav)+24px)}
.tpc-grid{grid-template-columns:repeat(3,1fr)}
.sg{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:1024px){.tpc-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div id="app">
<div class="content" id="content">
<div class="page" id="page-home"></div>
<div class="page" id="page-table"></div>
<div class="page" id="page-players"></div>
<div class="page" id="page-stats"></div>
<div class="page" id="page-settings"></div>
</div>
<nav class="nav" id="nav"></nav>
</div>
<div class="modal-bg" id="modal-bg"><div class="modal" id="modal-box"></div></div>
<div class="overlay" id="overlay-box"></div>
<div class="toast-c" id="toast-c"></div>

<script>
const COLORS=['#e53935','#d81b60','#8e24aa','#5e35b1','#3949ab','#1e88e5','#039be5','#00acc1','#00897b','#43a047','#7cb342','#c0ca33','#fdd835','#ffb300','#fb8c00','#f4511e'];

// Shamsi date converter
function toShamsi(ts){
  const d=new Date(ts);
  const gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate();
  const g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334];
  let gy2=gm>2?gy+1:gy;
  let days=355666+365*gy+(Math.floor((gy2+3)/4))-Math.floor((gy2+99)/100)+Math.floor((gy2+399)/400)+gd+g_d_m[gm-1];
  let jy=-1595+33*Math.floor(days/12053);days%=12053;
  jy+=4*Math.floor(days/1461);days%=1461;
  if(days>365){jy+=Math.floor((days-1)/365);days=(days-1)%365}
  let jm,jd;
  if(days<186){jm=1+Math.floor(days/31);jd=1+(days%31)}
  else{days-=186;jm=7+Math.floor(days/30);jd=1+(days%30)}
  const mn=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
  return jd+' '+mn[jm-1]+' '+jy;
}
function toShamsiShort(ts){
  const d=new Date(ts);
  const gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate();
  const g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334];
  let gy2=gm>2?gy+1:gy;
  let days=355666+365*gy+(Math.floor((gy2+3)/4))-Math.floor((gy2+99)/100)+Math.floor((gy2+399)/400)+gd+g_d_m[gm-1];
  let jy=-1595+33*Math.floor(days/12053);days%=12053;
  jy+=4*Math.floor(days/1461);days%=1461;
  if(days>365){jy+=Math.floor((days-1)/365);days=(days-1)%365}
  let jm,jd;
  if(days<186){jm=1+Math.floor(days/31);jd=1+(days%31)}
  else{days-=186;jm=7+Math.floor(days/30);jd=1+(days%30)}
  return jy+'/'+String(jm).padStart(2,'0')+'/'+String(jd).padStart(2,'0');
}

const S={
  d:null,
  defaults(){return{players:[],games:[],settings:{currency:'تومان',defaultBuyIn:1000000,quickAmounts:[1000000,2000000,3000000,4000000,5000000,6000000,7000000,8000000,9000000,10000000],sliderMax:20000000}}},
  load(){try{const r=localStorage.getItem('pkr');this.d=r?JSON.parse(r):this.defaults();if(!this.d.settings.quickAmounts)this.d.settings.quickAmounts=this.defaults().settings.quickAmounts;if(!this.d.settings.sliderMax)this.d.settings.sliderMax=20000000}catch(e){this.d=this.defaults()}},
  save(){try{localStorage.setItem('pkr',JSON.stringify(this.d))}catch(e){toast('خطا در ذخیره','err')}},
  get players(){return this.d.players},
  get games(){return this.d.games},
  get settings(){return this.d.settings}
};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function fmt(n){if(n==null||isNaN(n))return'0';return Number(n).toLocaleString('en-US')}
function fmtM(n){return fmt(n)+' '+S.settings.currency}
function dur(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`}
function fmtDate(ts){return toShamsi(ts)}
function fmtDateShort(ts){return toShamsiShort(ts)}
function fmtDateEN(ts){return new Date(ts).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}
function fmtDT(ts){return fmtDate(ts)+' '+fmtTime(ts)}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function acolor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}
function getPlayer(id){return S.players.find(p=>p.id===id)}
function activeGame(){return S.games.find(g=>g.status==='active')}
function profitClass(n){return n>0?'p-pos':n<0?'p-neg':'p-zero'}

function playerLifetimeStats(pid){
  let totalProfit=0,games=0,totalBuyIn=0,wins=0;
  S.games.filter(g=>g.status==='finished').forEach(g=>{
    const pt=g.participants.find(p=>p.playerId===pid);
    if(!pt)return;games++;
    const bi=pt.buyIns.reduce((s,b)=>s+b.amount,0);
    const co=pt.cashOut?pt.cashOut.amount:0;
    const net=co-bi;totalProfit+=net;totalBuyIn+=bi;
    if(net>0)wins++;
  });
  return{totalProfit,games,totalBuyIn,avgBuyIn:games?Math.round(totalBuyIn/games):0,wins,winRate:games?Math.round(wins/games*100):0};
}

function calcHouseFee(game){
  if(!game.houseFee||!game.houseFee.enabled)return 0;
  const totalBI=game.participants.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);
  if(game.houseFee.type==='fixed')return game.houseFee.value;
  let fee=Math.round(totalBI*game.houseFee.value/100);
  if(game.houseFee.cap&&fee>game.houseFee.cap)fee=game.houseFee.cap;
  return fee;
}

function calcSettlement(game){
  const nets=[];
  game.participants.forEach(p=>{
    const bi=p.buyIns.reduce((s,b)=>s+b.amount,0);
    const co=p.cashOut?p.cashOut.amount:0;
    nets.push({playerId:p.playerId,net:co-bi});
  });
  const winners=nets.filter(n=>n.net>0).map(n=>({...n})).sort((a,b)=>b.net-a.net);
  const losers=nets.filter(n=>n.net<0).map(n=>({...n,net:Math.abs(n.net)})).sort((a,b)=>b.net-a.net);
  const txns=[];let wi=0,li=0;
  while(wi<winners.length&&li<losers.length){
    const amt=Math.min(winners[wi].net,losers[li].net);
    txns.push({from:losers[li].playerId,to:winners[wi].playerId,amount:amt});
    winners[wi].net-=amt;losers[li].net-=amt;
    if(winners[wi].net===0)wi++;if(losers[li].net===0)li++;
  }
  return txns;
}

function toast(msg,type='ok'){
  const c=document.getElementById('toast-c');
  const t=document.createElement('div');
  t.className='toast t-'+(type==='err'?'err':type==='info'?'info':'ok');
  t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2500);
}

function showModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-bg').classList.add('on')}
function hideModal(){document.getElementById('modal-bg').classList.remove('on')}
function showOverlay(html){const o=document.getElementById('overlay-box');o.innerHTML=html;o.classList.add('on')}
function hideOverlay(){document.getElementById('overlay-box').classList.remove('on')}

let curPage='home',timerIv=null;

function nav(page){
  curPage=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const ni=document.querySelector(`[data-p="${page}"]`);if(ni)ni.classList.add('active');
  render(page);
}

    </div>`;
  }

  const finished=S.games.filter(g=>g.status==='finished');

    const ranked=S.players.map(p=>({...p,...playerLifetimeStats(p.id)})).filter(p=>p.games>0).sort((a,b)=>b.totalProfit-a.totalProfit).slice(0,5);
    if(ranked.length>0){
      html+=`<div class="st">🏆 برترین بازیکنان</div>`;
      ranked.forEach((p,i)=>{
        html+=`<div class="pi" onclick="showPlayerProfile('${p.id}')">
          <div class="rank ${i<3?'r'+(i+1):''}">${i+1}</div>
          <div class="avatar" style="background:${acolor(p.name)}">${initials(p.name)}</div>
          <div class="pi-info"><div class="pi-name">${p.name}</div><div class="pi-sub">${p.games} بازی</div></div>
          <div class="pi-val ${profitClass(p.totalProfit)}">${p.totalProfit>=0?'+':''}${fmtM(p.totalProfit)}</div>
        </div>`;
      });
    }
  }

  if(finished.length>0){
    const totalMoney=finished.reduce((s,g)=>s+g.participants.reduce((ss,p)=>ss+p.buyIns.reduce((sss,b)=>sss+b.amount,0),0),0);
    let maxWin=0;
    finished.forEach(g=>g.participants.forEach(p=>{const bi=p.buyIns.reduce((s,b)=>s+b.amount,0);const co=p.cashOut?p.cashOut.amount:0;if(co-bi>maxWin)maxWin=co-bi}));

      <div class="si"><div class="sv">${fmt(finished.length)}</div><div class="sl">تعداد بازی‌ها</div></div>

      <div class="si"><div class="sv">${fmtM(maxWin)}</div><div class="sl">بیشترین برد</div></div>
      <div class="si"><div class="sv">${fmt(S.players.length)}</div><div class="sl">بازیکنان</div></div>
    </div>`;
  }
  el.innerHTML=html;
}

function highlightQA(btn){btn.parentElement.querySelectorAll('.qa-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel')}
function toggleHFFields(){document.getElementById('hf-fields').style.display=document.getElementById('ng-hf-on').checked?'block':'none'}
function toggleHFCap(){document.getElementById('hf-cap-group').style.display=document.getElementById('ng-hf-type').value==='percentage'?'block':'none'}
function quickAddPlayer(){const name=prompt('نام بازیکن:');if(!name?.trim())return;S.players.push({id:uid(),name:name.trim(),createdAt:Date.now()});S.save();showNewGameModal();toast('بازیکن اضافه شد')}

function doStartGame(){
  const cbs=document.querySelectorAll('.ng-pcb:checked');
  if(cbs.length<2){toast('حداقل ۲ بازیکن','err');return}
  const buyIn=parseInt(document.getElementById('ng-buyin').value)||S.settings.defaultBuyIn;
  if(buyIn<=0){toast('مبلغ نامعتبر','err');return}
  let houseFee={enabled:false};
  if(document.getElementById('ng-hf-on').checked){
    const type=document.getElementById('ng-hf-type').value;
    const val=parseFloat(document.getElementById('ng-hf-val').value);
    if(!val||val<=0){toast('مقدار کانیات نامعتبر','err');return}
    houseFee={enabled:true,type,value:val};
    if(type==='percentage'){const cap=parseInt(document.getElementById('ng-hf-cap').value)||0;if(cap>0)houseFee.cap=cap}
  }
  S.games.push({id:uid(),startTime:Date.now(),endTime:null,status:'active',houseFee,
    participants:Array.from(cbs).map(cb=>({playerId:cb.value,buyIns:[{amount:buyIn,time:Date.now()}],cashOut:null,status:'playing'}))
  });
  S.settings.defaultBuyIn=buyIn;S.save();hideModal();toast('بازی شروع شد!');startTimer();nav('table');
}

  </div>`;

    html+=`<div class="tpc ${isOut?'out':'playing'}" onclick="showPlayerAction('${pt.playerId}')">
      <div class="tpc-top">
        <div class="tpc-avatar" style="background:${acolor(p.name)}">${initials(p.name)}</div>
        <div class="tpc-name">${p.name}</div>
        <span class="tpc-status ${isOut?'tpc-out':'tpc-playing'}">${isOut?'خارج':'فعال'}</span>
      </div>
      <div class="tpc-stats">
        <div class="tpc-stat"><div class="tpc-stat-val">${pt.buyIns.length}×</div><div class="tpc-stat-lbl">خرید</div></div>
        <div class="tpc-stat"><div class="tpc-stat-val">${fmt(totalBI)}</div><div class="tpc-stat-lbl">مجموع</div></div>
      </div>`;
    if(isOut&&pt.cashOut){
      html+=`<div class="tpc-stats" style="margin-top:6px">
        <div class="tpc-stat"><div class="tpc-stat-val">${fmt(pt.cashOut.amount)}</div><div class="tpc-stat-lbl">خروج</div></div>
        <div class="tpc-stat"><div class="tpc-stat-val ${profitClass(net)}">${net>=0?'+':''}${fmt(net)}</div><div class="tpc-stat-lbl">سود/زیان</div></div>
      </div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

// Player action popup when clicking player card
function showPlayerAction(pid){
  const ag=activeGame();if(!ag)return;
  const pt=ag.participants.find(p=>p.playerId===pid);if(!pt)return;
  const p=getPlayer(pid);if(!p)return;
  const totalBI=pt.buyIns.reduce((s,b)=>s+b.amount,0);
  const isOut=pt.status==='cashed-out';

  let html=`<div class="mh"><h3>${p.name}</h3><button class="mx" onclick="hideModal()">✕</button></div><div class="mb">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div class="tpc-avatar" style="background:${acolor(p.name)};width:48px;height:48px;font-size:18px">${initials(p.name)}</div>
      <div>
        <div style="font-size:16px;font-weight:700">${p.name}</div>
        <span class="badge ${isOut?'b-r':'b-g'}">${isOut?'خارج شده':'در بازی'}</span>
      </div>
    </div>
    <div class="sg">
      <div class="si"><div class="sv">${pt.buyIns.length}×</div><div class="sl">دفعات خرید</div></div>
      <div class="si"><div class="sv">${fmtM(totalBI)}</div><div class="sl">مجموع خرید</div></div>
      ${isOut&&pt.cashOut?`<div class="si"><div class="sv">${fmtM(pt.cashOut.amount)}</div><div class="sl">خروج</div></div>
      <div class="si"><div class="sv ${profitClass(pt.cashOut.amount-totalBI)}">${(pt.cashOut.amount-totalBI)>=0?'+':''}${fmtM(pt.cashOut.amount-totalBI)}</div><div class="sl">سود/زیان</div></div>`:''}
    </div>`;

  // Buy-in history
  html+=`<div class="st" style="font-size:13px">تاریخچه خریدها</div>`;
  pt.buyIns.forEach((b,i)=>{
    html+=`<div class="flex-b" style="padding:5px 0;font-size:12px;border-bottom:1px solid var(--brd)">
      <span>خرید ${i+1}: ${fmtM(b.amount)} — ${fmtTime(b.time)}</span>
    </div>`;
  });
  if(isOut&&pt.cashOut)html+=`<div style="padding:5px 0;font-size:12px;color:var(--gld)">خروج: ${fmtM(pt.cashOut.amount)} — ${fmtTime(pt.cashOut.time)}</div>`;

  html+=`<hr class="div">`;
  if(!isOut){
    html+=`<div style="display:flex;gap:8px">
      <button class="btn btn-p" style="flex:1" onclick="hideModal();showBuyInModalFor('${pid}')">💰 خرید جدید</button>
      <button class="btn btn-g" style="flex:1" onclick="hideModal();showCashOutModalFor('${pid}')">💵 خروج</button>
    </div>`;
  }else{
    html+=`<div style="display:flex;gap:8px">
      <button class="btn btn-s" style="flex:1" onclick="undoCashOutDirect('${ag.id}','${pid}')">↩ برگرداندن خروج</button>
    </div>`;
  }

  html+=`</div><div class="mf"><button class="btn btn-s" onclick="hideModal()">بستن</button></div>`;
  showModal(html);
}

function undoCashOutDirect(gid,pid){
  const g=S.games.find(g=>g.id===gid);if(!g||g.status!=='active')return;
  const pt=g.participants.find(p=>p.playerId===pid);if(!pt)return;
  pt.cashOut=null;pt.status='playing';
  S.save();hideModal();toast('خروج برگردانده شد');renderTable();
}

// ===== AMOUNT PICKER (shared) =====
function amountPickerHTML(prefix,defaultVal){
  const sMax=S.settings.sliderMax;
  let html=`<div class="fg"><label class="fl">مبالغ سریع</label>
    <div class="qa-grid">`;
  S.settings.quickAmounts.forEach(a=>{
    html+=`<button type="button" class="qa-btn${a===defaultVal?' sel':''}" onclick="setAmount('${prefix}',${a});highlightQA(this)">${fmt(a)}</button>`;
  });
  html+=`</div></div>
    <div class="fg"><label class="fl">مبلغ دلخواه</label><input type="number" id="${prefix}-custom" value="${defaultVal}" inputmode="numeric" placeholder="مبلغ دلخواه..." oninput="syncFromCustom('${prefix}')"></div>
    <div class="slider-val" id="${prefix}-display">${fmt(defaultVal)}</div>
    <div class="slider-wrap"><input type="range" id="${prefix}-slider" min="0" max="${sMax}" step="100000" value="${Math.min(defaultVal,sMax)}" oninput="syncFromSlider('${prefix}')"></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);direction:ltr;margin-bottom:8px"><span>0</span><span>${fmt(sMax)}</span></div>
    <input type="hidden" id="${prefix}-val" value="${defaultVal}">`;
  return html;
}

function setAmount(prefix,val){
  document.getElementById(prefix+'-val').value=val;
  document.getElementById(prefix+'-display').textContent=fmt(val);
  document.getElementById(prefix+'-custom').value=val;
  const slider=document.getElementById(prefix+'-slider');
  if(val<=parseInt(slider.max))slider.value=val;
}

function syncFromSlider(prefix){
  const v=parseInt(document.getElementById(prefix+'-slider').value);
  document.getElementById(prefix+'-val').value=v;
  document.getElementById(prefix+'-display').textContent=fmt(v);
  document.getElementById(prefix+'-custom').value=v;
  // deselect quick amounts
  document.querySelectorAll(`#${prefix}-slider`).forEach(()=>{
    const grid=document.getElementById(prefix+'-custom')?.closest('.mb')?.querySelector('.qa-grid');
    if(grid)grid.querySelectorAll('.qa-btn').forEach(b=>b.classList.remove('sel'));
  });
}

function syncFromCustom(prefix){
  const v=parseInt(document.getElementById(prefix+'-custom').value)||0;
  document.getElementById(prefix+'-val').value=v;
  document.getElementById(prefix+'-display').textContent=fmt(v);
  const slider=document.getElementById(prefix+'-slider');
  if(v<=parseInt(slider.max))slider.value=v;else slider.value=slider.max;
}

function showBuyInModal(){
  const ag=activeGame();if(!ag)return;
  const playing=ag.participants.filter(p=>p.status==='playing');
  if(!playing.length){toast('بازیکن فعالی نیست','err');return}
  let html=`<div class="mh"><h3>ثبت خرید</h3><button class="mx" onclick="hideModal()">✕</button></div><div class="mb">
    <div class="fg"><label class="fl">بازیکن</label><select id="bi-player">`;
  playing.forEach(pt=>{const p=getPlayer(pt.playerId);if(p)html+=`<option value="${pt.playerId}">${p.name}</option>`});
  html+=`</select></div>${amountPickerHTML('bi',S.settings.defaultBuyIn)}
  </div><div class="mf"><button class="btn btn-s" onclick="hideModal()">انصراف</button><button class="btn btn-p" onclick="doBuyIn()">ثبت خرید</button></div>`;
  showModal(html);
}

function showBuyInModalFor(pid){
  const ag=activeGame();if(!ag)return;
  const p=getPlayer(pid);if(!p)return;
  let html=`<div class="mh"><h3>خرید برای ${p.name}</h3><button class="mx" onclick="hideModal()">✕</button></div><div class="mb">
    <input type="hidden" id="bi-player" value="${pid}">
    ${amountPickerHTML('bi',S.settings.defaultBuyIn)}
  </div><div class="mf"><button class="btn btn-s" onclick="hideModal()">انصراف</button><button class="btn btn-p" onclick="doBuyIn()">ثبت خرید</button></div>`;
  showModal(html);
}

function doBuyIn(){
  const ag=activeGame();if(!ag)return;
  const pid=document.getElementById('bi-player').value;
  const amt=parseInt(document.getElementById('bi-val').value);
  if(!amt||amt<=0){toast('مبلغ نامعتبر','err');return}
  const pt=ag.participants.find(p=>p.playerId===pid);
  if(!pt){toast('بازیکن پیدا نشد','err');return}
  pt.buyIns.push({amount:amt,time:Date.now()});
  S.save();hideModal();toast('خرید ثبت شد');renderTable();
}

// ===== CASH OUT MODAL =====
function showCashOutModal(){
  const ag=activeGame();if(!ag)return;
  const playing=ag.participants.filter(p=>p.status==='playing');
  if(!playing.length){toast('بازیکن فعالی نیست','err');return}
  let html=`<div class="mh"><h3>خروج بازیکن</h3><button class="mx" onclick="hideModal()">✕</button></div><div class="mb">
    <div class="fg"><label class="fl">بازیکن</label><select id="co-player">`;
  playing.forEach(pt=>{const p=getPlayer(pt.playerId);if(p)html+=`<option value="${pt.playerId}">${p.name}</option>`});
  html+=`</select></div>${amountPickerHTML('co',0)}
  </div><div class="mf"><button class="btn btn-s" onclick="hideModal()">انصراف</button><button class="btn btn-g" onclick="doCashOut()">ثبت خروج</button></div>`;
  showModal(html);
}

function showCashOutModalFor(pid){
  const ag=activeGame();if(!ag)return;
  const p=getPlayer(pid);if(!p)return;
  let html=`<div class="mh"><h3>خروج ${p.name}</h3><button class="mx" onclick="hideModal()">✕</button></div><div class="mb">
    <input type="hidden" id="co-player" value="${pid}">
    ${amountPickerHTML('co',0)}
  </div><div class="mf"><button class="btn btn-s" onclick="hideModal()">انصراف</button><button class="btn btn-g" onclick="doCashOut()">ثبت خروج</button></div>`;
  showModal(html);
}

function doCashOut(){
  const ag=activeGame();if(!ag)return;
  const pid=document.getElementById('co-player').value;
  const amt=parseInt(document.getElementById('co-val').value);
  if(amt==null||amt<0||isNaN(amt)){toast('مبلغ نامعتبر','err');return}
  const pt=ag.participants.find(p=>p.playerId===pid);
  if(!pt){toast('بازیکن پیدا نشد','err');return}
  pt.cashOut={amount:amt,time:Date.now()};pt.status='cashed-out';
  S.save();hideModal();toast('بازیکن خارج شد');renderTable();
}

// ===== ADD PLAYER TO GAME =====
function showAddToGameModal(){
  const ag=activeGame();if(!ag)return;
  const inGame=new Set(ag.participants.map(p=>p.playerId));
  const avail=S.players.filter(p=>!inGame.has(p.id));
  let html=`<div class="mh"><h3>افزودن بازیکن</h3><button class="mx" onclick="hideModal()">✕</button></div><div class="mb">`;
  if(!avail.length){
    html+=`<div class="empty"><p>همه بازیکنان در بازی هستند</p></div><button class="btn btn-s btn-w" onclick="quickAddAndJoin()">+ ساخت بازیکن جدید</button>`;
  }else{

function quickAddAndJoin(){const name=prompt('نام بازیکن:');if(!name?.trim())return;S.players.push({id:uid(),name:name.trim(),createdAt:Date.now()});S.save();showAddToGameModal();toast('ساخته شد')}
function doAddToGame(){
  const ag=activeGame();if(!ag)return;

// ===== MANAGE PANEL =====
function showBuyInPanel(){
  const ag=activeGame();if(!ag)return;
  let html=`<div class="oh"><button onclick="hideOverlay();renderTable()">→</button><h3>مدیریت خرید و خروج</h3></div><div class="oc">`;

          ${pt.buyIns.length>1?`<button class="btn btn-d btn-sm" style="padding:4px 8px;font-size:11px" onclick="delBuyIn('${ag.id}','${pt.playerId}',${i})">حذف</button>`:''}

        <button class="btn btn-s btn-sm" style="padding:2px 8px;font-size:11px;margin-right:8px" onclick="editCashOut('${ag.id}','${pt.playerId}')">ویرایش</button>

    }
    html+=`</div>`;

function editBuyIn(gid,pid,idx){const g=S.games.find(g=>g.id===gid);if(!g||g.status!=='active')return;const pt=g.participants.find(p=>p.playerId===pid);if(!pt)return;const v=prompt('مبلغ جدید:',pt.buyIns[idx].amount);if(v===null)return;const n=parseInt(v);if(!n||n<=0){toast('نامعتبر','err');return}pt.buyIns[idx].amount=n;S.save();showBuyInPanel();toast('ویرایش شد')}
function delBuyIn(gid,pid,idx){if(!confirm('حذف شود؟'))return;const g=S.games.find(g=>g.id===gid);if(!g||g.status!=='active')return;const pt=g.participants.find(p=>p.playerId===pid);if(!pt)return;pt.buyIns.splice(idx,1);S.save();showBuyInPanel();toast('حذف شد')}
function editCashOut(gid,pid){const g=S.games.find(g=>g.id===gid);if(!g||g.status!=='active')return;const pt=g.participants.find(p=>p.playerId===pid);if(!pt?.cashOut)return;const v=prompt('مبلغ جدید خروج:',pt.cashOut.amount);if(v===null)return;const n=parseInt(v);if(n==null||n<0||isNaN(n)){toast('نامعتبر','err');return}pt.cashOut.amount=n;S.save();showBuyInPanel();renderTable();toast('ویرایش شد')}
function undoCashOut(gid,pid){if(!confirm('برگرداندن خروج؟'))return;const g=S.games.find(g=>g.id===gid);if(!g||g.status!=='active')return;const pt=g.participants.find(p=>p.playerId===pid);if(!pt)return;pt.cashOut=null;pt.status='playing';S.save();showBuyInPanel();renderTable();toast('برگردانده شد')}

// ===== END GAME =====
function showEndGameModal(){
  const ag=activeGame();if(!ag)return;
  const playing=ag.participants.filter(p=>p.status==='playing');
  if(playing.length>0){
    let html=`<div class="mh"><h3>پایان بازی ممکن نیست</h3><button class="mx" onclick="hideModal()">✕</button></div><div class="mb">
      <p style="margin-bottom:12px;color:var(--red2)">ابتدا تمام بازیکنان باید خارج شوند.</p><div class="st">بازیکنان فعال:</div>`;
    playing.forEach(pt=>{const p=getPlayer(pt.playerId);if(p)html+=`<div class="pi" style="cursor:default"><div class="avatar" style="background:${acolor(p.name)};width:30px;height:30px;font-size:12px">${initials(p.name)}</div><div class="pi-info"><div class="pi-name">${p.name}</div></div></div>`});
    html+=`</div><div class="mf"><button class="btn btn-s" onclick="hideModal()">بستن</button><button class="btn btn-g" onclick="hideModal();showCashOutModal()">خروج بازیکنان</button></div>`;
    showModal(html);return;
  }
  const totalBI=ag.participants.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);
  const totalCO=ag.participants.reduce((s,p)=>s+(p.cashOut?p.cashOut.amount:0),0);
  const txns=calcSettlement(ag);const duration=dur(Date.now()-ag.startTime);
  const expectedFee=calcHouseFee(ag);const actualFee=totalBI-totalCO;

  let html=`<div class="mh"><h3>پایان بازی — تسویه</h3><button class="mx" onclick="hideModal()">✕</button></div><div class="mb">
    <div class="sg mb-12">
      <div class="si"><div class="sv">${fmtM(totalBI)}</div><div class="sl">مجموع خرید</div></div>
      <div class="si"><div class="sv">${fmtM(totalCO)}</div><div class="sl">مجموع خروج</div></div>
      <div class="si"><div class="sv">${duration}</div><div class="sl">مدت بازی</div></div>
    </div>`;
  if(ag.houseFee?.enabled){
    html+=`<div class="card"><div class="card-title">کانیات</div>
      <div>محاسبه‌شده: <strong>${fmtM(expectedFee)}</strong></div>
      <div>واقعی: <strong>${fmtM(actualFee)}</strong></div>
      ${Math.abs(actualFee-expectedFee)>1?`<div style="color:var(--red2);font-size:12px;margin-top:4px">⚠ اختلاف: ${fmtM(Math.abs(actualFee-expectedFee))}</div>`:'<div style="color:var(--grn4);font-size:12px;margin-top:4px">✓ تراز</div>'}
    </div>`;
  }
  html+=`<div class="st">نتایج</div><div class="scroll-x"><table class="dt"><tr><th>بازیکن</th><th>خرید</th><th>خروج</th><th>سود/زیان</th></tr>`;
  ag.participants.forEach(pt=>{const p=getPlayer(pt.playerId);if(!p)return;const bi=pt.buyIns.reduce((s,b)=>s+b.amount,0);const co=pt.cashOut?pt.cashOut.amount:0;const net=co-bi;
    html+=`<tr><td>${p.name}</td><td>${fmtM(bi)}</td><td>${fmtM(co)}</td><td class="${profitClass(net)}"><strong>${net>=0?'+':''}${fmtM(net)}</strong></td></tr>`});
  html+=`</table></div>`;
  if(txns.length>0){
    html+=`<div class="st">💸 تسویه</div>`;
    txns.forEach(t=>{const from=getPlayer(t.from);const to=getPlayer(t.to);
      html+=`<div class="card" style="padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:13px"><strong>${from?.name||'?'}</strong> <span style="color:var(--tx2)">به</span> <strong>${to?.name||'?'}</strong><span style="margin-left:auto;font-weight:700;color:var(--gld)">${fmtM(t.amount)}</span></div>`});
  }
  html+=`</div><div class="mf"><button class="btn btn-s" onclick="hideModal()">انصراف</button><button class="btn btn-d" onclick="doEndGame()">تأیید و پایان</button></div>`;
  showModal(html);
}
function doEndGame(){const ag=activeGame();if(!ag)return;ag.status='finished';ag.endTime=Date.now();S.save();hideModal();stopTimer();toast('بازی تمام شد!');nav('home')}

function filterPlayers(){const q=document.getElementById('player-search').value.toLowerCase();document.querySelectorAll('.player-row').forEach(r=>{r.style.display=r.dataset.name.includes(q)?'':'none'})}
function showNewPlayerModal(){

function doCreatePlayer(){const name=document.getElementById('np-name').value.trim();if(!name){toast('نام وارد کنید','err');return}if(S.players.some(p=>p.name.toLowerCase()===name.toLowerCase())){toast('تکراری','err');return}S.players.push({id:uid(),name,createdAt:Date.now()});S.save();hideModal();toast('ایجاد شد');renderPlayers()}

function showPlayerProfile(pid){
  const p=getPlayer(pid);if(!p)return;const st=playerLifetimeStats(pid);
  const games=S.games.filter(g=>g.status==='finished'&&g.participants.some(pt=>pt.playerId===pid)).sort((a,b)=>b.startTime-a.startTime);

  let html=`<div class="oh"><button onclick="hideOverlay()">→</button><h3>${p.name}</h3><button style="margin-left:auto" class="btn btn-d btn-sm" onclick="confirmDeletePlayer('${pid}')">حذف</button></div><div class="oc">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">

    </div>
    <div class="sg">
      <div class="si"><div class="sv ${profitClass(st.totalProfit)}">${st.totalProfit>=0?'+':''}${fmtM(st.totalProfit)}</div><div class="sl">سود/زیان کل</div></div>
      <div class="si"><div class="sv">${fmt(st.games)}</div><div class="sl">بازی</div></div>
      <div class="si"><div class="sv">${st.winRate}%</div><div class="sl">نرخ برد</div></div>
      <div class="si"><div class="sv">${fmtM(st.avgBuyIn)}</div><div class="sl">میانگین خرید</div></div>
    </div>`;
  if(games.length>=2)html+=`<div class="st">📈 عملکرد</div><div class="chart-box"><canvas id="player-chart"></canvas></div>`;
  html+=`<div class="st">🎮 تاریخچه</div>`;
  if(!games.length)html+=`<div class="empty"><p>بازی‌ای نیست</p></div>`;
  else games.forEach(g=>{
    const pt=g.participants.find(pp=>pp.playerId===pid);const bi=pt.buyIns.reduce((s,b)=>s+b.amount,0);const co=pt.cashOut?pt.cashOut.amount:0;const net=co-bi;
    html+=`<div class="gc" onclick="hideOverlay();showGameDetails('${g.id}')">
      <div class="flex-b mb-8"><span style="font-weight:600;font-size:13px">${fmtDate(g.startTime)}</span><span class="badge b-b">${dur(g.endTime-g.startTime)}</span></div>
      <div style="font-size:12px;color:var(--tx2)">خرید: ${fmtM(bi)} · خروج: ${fmtM(co)}</div>
      <div style="font-size:14px;font-weight:700;margin-top:4px" class="${profitClass(net)}">${net>=0?'+':''}${fmtM(net)}</div>
    </div>`;
  });
  html+=`</div>`;showOverlay(html);
  if(games.length>=2)setTimeout(()=>{const c=document.getElementById('player-chart');if(c)drawPlayerChart(c,pid,[...games].reverse())},100);
}
function confirmDeletePlayer(pid){const p=getPlayer(pid);if(!p)return;if(activeGame()?.participants.some(pt=>pt.playerId===pid)){toast('در بازی فعال — حذف ممکن نیست','err');return}if(!confirm(`${p.name} حذف شود؟`))return;S.d.players=S.players.filter(pp=>pp.id!==pid);S.save();hideOverlay();toast('حذف شد');renderPlayers()}

function renderStats(){
  const el=document.getElementById('page-stats');

  const totalMoney=finished.reduce((s,g)=>s+g.participants.reduce((ss,p)=>ss+p.buyIns.reduce((sss,b)=>sss+b.amount,0),0),0);
  const avgDuration=finished.reduce((s,g)=>s+(g.endTime-g.startTime),0)/finished.length;

    <div class="si"><div class="sv">${fmt(finished.length)}</div><div class="sl">تعداد بازی</div></div>

  html+=`<div class="st">📈 عملکرد بازیکنان</div><div class="chart-box"><canvas id="chart-players"></canvas></div>`;
  html+=`<div class="st">🎮 تاریخچه</div>`;

    html+=`<div class="gc" onclick="showGameDetails('${g.id}')">

    const cm=document.getElementById('chart-money');if(cm)drawMoneyChart(cm,finished);
    const cp=document.getElementById('chart-players');if(cp)drawPlayersChart(cp,finished);
  },100);
}

function showGameDetails(gid){

  html+=`</table></div>`;

    html+=`</div>`;

  html+=`</div>`;showOverlay(html);
}

}
function saveCurrency(){S.settings.currency=document.getElementById('set-currency').value.trim()||'تومان';S.save();toast('ذخیره شد')}
function saveDefaultBI(){const v=parseInt(document.getElementById('set-buyin').value);if(v>0){S.settings.defaultBuyIn=v;S.save();toast('ذخیره شد')}}
function saveSliderMax(){const v=parseInt(document.getElementById('set-smax').value);if(v>0){S.settings.sliderMax=v;S.save();toast('ذخیره شد')}}
function addQA(){const v=parseInt(document.getElementById('new-qa').value);if(!v||v<=0){toast('نامعتبر','err');return}if(S.settings.quickAmounts.includes(v)){toast('تکراری','err');return}S.settings.quickAmounts.push(v);S.settings.quickAmounts.sort((a,b)=>a-b);S.save();renderSettings();toast('اضافه شد')}
function removeQA(i){S.settings.quickAmounts.splice(i,1);S.save();renderSettings();toast('حذف شد')}
function doBackup(){const b=new Blob([JSON.stringify(S.d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='poker_backup_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);toast('دانلود شد')}
function doRestore(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.players||!d.games){toast('فایل نامعتبر','err');return}if(!confirm('جایگزین شود؟'))return;S.d=d;S.save();toast('بازیابی شد');nav(curPage)}catch{toast('خطا','err')}};r.readAsText(f);e.target.value=''}
function doClear(){if(!confirm('حذف همه؟'))return;if(!confirm('مطمئنید؟'))return;S.d=S.defaults();S.save();stopTimer();toast('حذف شد');nav('home')}

// ===== CHARTS =====
function setupCanvas(c){const r=c.parentElement.getBoundingClientRect();const d=window.devicePixelRatio||1;c.width=r.width*d;c.height=200*d;c.style.width=r.width+'px';c.style.height='200px';const x=c.getContext('2d');x.scale(d,d);return{ctx:x,w:r.width,h:200}}

function drawMoneyChart(canvas,games){
  const{ctx,w,h}=setupCanvas(canvas);if(!games.length)return;
  const data=games.map(g=>({
    label:toShamsiShort(g.startTime),
    value:g.participants.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0)
  }));
  const max=Math.max(...data.map(d=>d.value));
  const pad={t:20,r:10,b:50,l:10};const cw=w-pad.l-pad.r;const ch=h-pad.t-pad.b;
  const bw=Math.min(36,cw/data.length-6);const gap=(cw-bw*data.length)/(data.length+1);
  ctx.fillStyle='#1c2333';ctx.fillRect(0,0,w,h);
  data.forEach((d,i)=>{
    const x=pad.l+gap+(bw+gap)*i;const bh=max>0?(d.value/max)*ch:0;const y=pad.t+ch-bh;
    const grd=ctx.createLinearGradient(x,y,x,pad.t+ch);grd.addColorStop(0,'#2ea043');grd.addColorStop(1,'#0d4420');
    ctx.fillStyle=grd;ctx.beginPath();ctx.rect(x,y,bw,bh);ctx.fill();
    // Value on top
    ctx.fillStyle='#e6edf3';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
    ctx.fillText(fmt(d.value),x+bw/2,y-5);
    // Date label
    ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';
    ctx.save();ctx.translate(x+bw/2,h-pad.b+10);ctx.rotate(-0.5);ctx.fillText(d.label,0,0);ctx.restore();
  });
}

function drawPlayersChart(canvas,games){
  const{ctx,w,h}=setupCanvas(canvas);if(games.length<2)return;
  const pids=[...new Set(games.flatMap(g=>g.participants.map(p=>p.playerId)))];
  const lines={};
  pids.forEach(pid=>{let cum=0;lines[pid]=games.map(g=>{const pt=g.participants.find(p=>p.playerId===pid);if(pt){cum+=((pt.cashOut?pt.cashOut.amount:0)-pt.buyIns.reduce((s,b)=>s+b.amount,0))}return cum})});
  const all=Object.values(lines).flat();const mn=Math.min(0,...all);const mx=Math.max(0,...all);const rng=mx-mn||1;
  const pad={t:10,r:10,b:40,l:10};const cw=w-pad.l-pad.r;const ch=h-pad.t-pad.b;
  ctx.fillStyle='#1c2333';ctx.fillRect(0,0,w,h);
  const zy=pad.t+ch*(mx/rng);
  ctx.strokeStyle='#30363d';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,zy);ctx.lineTo(w-pad.r,zy);ctx.stroke();
  pids.forEach(pid=>{
    const p=getPlayer(pid);const c=p?acolor(p.name):'#888';const pts=lines[pid];
    ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();
    pts.forEach((v,i)=>{const x=pad.l+(cw/(pts.length-1||1))*i;const y=pad.t+ch*((mx-v)/rng);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
    ctx.stroke();
    const ly=pad.t+ch*((mx-pts[pts.length-1])/rng);
    ctx.fillStyle=c;ctx.font='bold 9px sans-serif';ctx.textAlign='left';ctx.fillText(p?.name||'?',w-pad.r-50,ly-4);
  });
  ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';ctx.textAlign='center';
  games.forEach((g,i)=>{if(games.length>10&&i%Math.ceil(games.length/8)!==0)return;const x=pad.l+(cw/(games.length-1||1))*i;
    ctx.save();ctx.translate(x,h-pad.b+10);ctx.rotate(-0.5);ctx.fillText(toShamsiShort(g.startTime),0,0);ctx.restore()});
}

function drawPlayerChart(canvas,pid,games){
  const{ctx,w,h}=setupCanvas(canvas);if(games.length<2)return;
  let cum=0;
  const pts=games.map(g=>{const pt=g.participants.find(p=>p.playerId===pid);if(pt){cum+=((pt.cashOut?pt.cashOut.amount:0)-pt.buyIns.reduce((s,b)=>s+b.amount,0))}return{label:toShamsiShort(g.startTime),value:cum}});
  const mn=Math.min(0,...pts.map(p=>p.value));const mx=Math.max(0,...pts.map(p=>p.value));const rng=mx-mn||1;
  const pad={t:10,r:10,b:40,l:10};const cw=w-pad.l-pad.r;const ch=h-pad.t-pad.b;
  ctx.fillStyle='#1c2333';ctx.fillRect(0,0,w,h);
  const zy=pad.t+ch*(mx/rng);ctx.strokeStyle='#30363d';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,zy);ctx.lineTo(w-pad.r,zy);ctx.stroke();
  ctx.beginPath();
  pts.forEach((p,i)=>{const x=pad.l+(cw/(pts.length-1||1))*i;const y=pad.t+ch*((mx-p.value)/rng);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.lineTo(pad.l+(cw/(pts.length-1||1))*(pts.length-1),zy);ctx.lineTo(pad.l,zy);ctx.closePath();
  const grd=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);grd.addColorStop(0,'rgba(46,160,67,0.3)');grd.addColorStop(1,'rgba(46,160,67,0.02)');ctx.fillStyle=grd;ctx.fill();
  ctx.strokeStyle='#3fb950';ctx.lineWidth=2;ctx.beginPath();
  pts.forEach((p,i)=>{const x=pad.l+(cw/(pts.length-1||1))*i;const y=pad.t+ch*((mx-p.value)/rng);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke();
  pts.forEach((p,i)=>{const x=pad.l+(cw/(pts.length-1||1))*i;const y=pad.t+ch*((mx-p.value)/rng);ctx.fillStyle=p.value>=0?'#3fb950':'#f85149';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()});
  ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';ctx.textAlign='center';
  pts.forEach((p,i)=>{if(pts.length>8&&i%Math.ceil(pts.length/6)!==0&&i!==pts.length-1)return;const x=pad.l+(cw/(pts.length-1||1))*i;
    ctx.save();ctx.translate(x,h-pad.b+10);ctx.rotate(-0.5);ctx.fillText(p.label,0,0);ctx.restore()});
}

function exportPDF(gid){

  const totalBI=g.participants.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);
  const totalCO=g.participants.reduce((s,p)=>s+(p.cashOut?p.cashOut.amount:0),0);
  const d=g.endTime?dur(g.endTime-g.startTime):'N/A';const fee=calcHouseFee(g);const txns=g.status==='finished'?calcSettlement(g):[];
  let rows='';g.participants.forEach(pt=>{const p=getPlayer(pt.playerId);const bi=pt.buyIns.reduce((s,b)=>s+b.amount,0);const co=pt.cashOut?pt.cashOut.amount:0;const net=co-bi;rows+=`<tr><td>${p?.name||'?'}</td><td>${pt.buyIns.length}</td><td>${fmt(bi)}</td><td>${fmt(co)}</td><td style="color:${net>=0?'#2ea043':'#da3633'};font-weight:bold">${net>=0?'+':''}${fmt(net)}</td></tr>`});
  let bd='';g.participants.forEach(pt=>{const p=getPlayer(pt.playerId);if(!p)return;bd+=`<h4>${p.name}</h4>`;pt.buyIns.forEach(b=>{bd+=`<div style="font-size:12px">• ${fmtTime(b.time)} — ${fmt(b.amount)} ${S.settings.currency}</div>`});if(pt.cashOut)bd+=`<div style="font-size:12px;color:#d4a017">Cash-out: ${fmt(pt.cashOut.amount)} ${S.settings.currency} at ${fmtTime(pt.cashOut.time)}</div>`});
  let sh='';if(txns.length){sh='<h3>Settlement</h3>';txns.forEach(t=>{sh+=`<div style="padding:6px 0;border-bottom:1px solid #ddd;font-size:13px"><strong>${getPlayer(t.from)?.name||'?'}</strong> pays <strong>${getPlayer(t.to)?.name||'?'}</strong> → <strong>${fmt(t.amount)} ${S.settings.currency}</strong></div>`})}
  const phtml=`<!DOCTYPE html><html lang="en"><head><title>Game Report</title><style>body{font-family:-apple-system,Helvetica,sans-serif;padding:30px;color:#222;max-width:800px;margin:auto}h1{font-size:22px;border-bottom:2px solid #222;padding-bottom:8px}h3{margin-top:20px;font-size:16px;border-bottom:1px solid #ccc;padding-bottom:4px}h4{margin:10px 0 5px}table{width:100%;border-collapse:collapse;margin:10px 0}th,td{padding:8px 10px;border:1px solid #ccc;text-align:left;font-size:13px}th{background:#f0f0f0}.info{display:flex;flex-wrap:wrap;gap:20px;margin:15px 0}.ii{flex:1;min-width:120px;padding:10px;background:#f8f8f8;border-radius:6px;text-align:center}.iv{font-size:18px;font-weight:700}.il{font-size:11px;color:#666}@media print{body{padding:15px}}</style></head><body>
<h1>♠ Poker Game Report</h1>
<div class="info"><div class="ii"><div class="iv">${fmtDateEN(g.startTime)}</div><div class="il">Date</div></div><div class="ii"><div class="iv">${fmtTime(g.startTime)}-${g.endTime?fmtTime(g.endTime):'N/A'}</div><div class="il">Time</div></div><div class="ii"><div class="iv">${d}</div><div class="il">Duration</div></div><div class="ii"><div class="iv">${fmt(totalBI)} ${S.settings.currency}</div><div class="il">Total Buy-ins</div></div><div class="ii"><div class="iv">${g.participants.length}</div><div class="il">Players</div></div></div>
${g.houseFee?.enabled?`<h3>House Fee</h3><div style="font-size:13px"><div>Type: ${g.houseFee.type==='percentage'?g.houseFee.value+'%':'Fixed '+fmt(g.houseFee.value)}</div>${g.houseFee.cap?`<div>Cap: ${fmt(g.houseFee.cap)}</div>`:''}<div>Calculated: <strong>${fmt(fee)}</strong></div><div>Actual: <strong>${fmt(totalBI-totalCO)}</strong></div></div>`:''}
<h3>Results</h3><table><tr><th>Player</th><th>Buy-ins</th><th>Total BI</th><th>Cash-out</th><th>P&amp;L</th></tr>${rows}</table>
<h3>Details</h3>${bd}${sh}
<div style="margin-top:30px;font-size:11px;color:#999;text-align:center">Generated by Poker Manager Pro — ${new Date().toLocaleString('en-US')}</div></body></html>`;
  const win=window.open('','_blank');if(win){win.document.write(phtml);win.document.close();setTimeout(()=>win.print(),500)}else toast('پاپ‌آپ را فعال کنید','err');
}

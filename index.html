<div class="quick-amounts">`;s.quickAmounts.forEach(a=>{html+=`<button class="quick-amt" onclick="setCashOutAmount(${a},${tb})">${fmt(a)}</button>`});html+=`</div>
<div class="form-group" style="margin-top:12px"><label class="form-label">یا مبلغ دلخواه</label><input class="form-input" id="cashout-custom" type="number" placeholder="مبلغ خروج" style="direction:ltr" oninput="syncCashOutSlider(${tb})"></div>
<button class="btn btn-gold btn-block" onclick="confirmCashOut('${odId}')">✅ تأیید خروج</button>`;showModal(html)}
function updateCashOutDisplay(tb){const v=parseInt(document.getElementById('cashout-slider').value);document.getElementById('cashout-display').textContent=fmt(v)+' '+getCurrency();const pr=v-tb;const e=document.getElementById('cashout-profit');if(pr>0){e.textContent='🟢 سود: +'+fmt(pr);e.style.color='var(--green)'}else if(pr<0){e.textContent='🔴 ضرر: '+fmt(pr);e.style.color='var(--red)'}else{e.textContent='⚪ بی‌حساب';e.style.color='var(--text2)'}document.getElementById('cashout-custom').value=''}
function setCashOutAmount(a,tb){document.getElementById('cashout-slider').value=Math.min(a,data.settings.sliderMax);document.getElementById('cashout-display').textContent=fmt(a)+' '+getCurrency();document.getElementById('cashout-custom').value=a;const pr=a-tb;const e=document.getElementById('cashout-profit');if(pr>0){e.textContent='🟢 سود: +'+fmt(pr);e.style.color='var(--green)'}else if(pr<0){e.textContent='🔴 ضرر: '+fmt(pr);e.style.color='var(--red)'}else{e.textContent='⚪ بی‌حساب';e.style.color='var(--text2)'}}
function syncCashOutSlider(tb){const v=parseInt(document.getElementById('cashout-custom').value)||0;document.getElementById('cashout-slider').value=Math.min(v,data.settings.sliderMax);document.getElementById('cashout-display').textContent=fmt(v)+' '+getCurrency();const pr=v-tb;const e=document.getElementById('cashout-profit');if(pr>0){e.textContent='🟢 سود: +'+fmt(pr);e.style.color='var(--green)'}else if(pr<0){e.textContent='🔴 ضرر: '+fmt(pr);e.style.color='var(--red)'}else{e.textContent='⚪ بی‌حساب';e.style.color='var(--text2)'}}
function confirmCashOut(odId){const c=document.getElementById('cashout-custom').value;const sl=document.getElementById('cashout-slider').value;const amt=parseInt(c)||parseInt(sl)||0;const g=getActiveGame();const gp=g.players.find(p=>p.odId===odId);if(!gp)return;gp.cashedOut=true;gp.cashOutAmount=amt;gp.cashOutTime=Date.now();saveData();hideModal();renderTablePage()}
function undoCashOut(odId){const g=getActiveGame();const gp=g.players.find(p=>p.odId===odId);if(gp){gp.cashedOut=false;gp.cashOutAmount=null;gp.cashOutTime=null;saveData();renderTablePage()}}
function removePlayerFromTable(odId){const g=getActiveGame();if(!g)return;const gp=g.players.find(p=>p.odId===odId);if(!gp)return;confirmDialog({title:'حذف از میز؟',message:`<strong>${gp.name}</strong> از این بازی حذف می‌شود و تمام خریدهای ثبت‌شده‌اش پاک خواهند شد.`,confirmText:'حذف از میز',cancelText:'انصراف',danger:true,icon:'🚫',onConfirm:()=>{g.players=g.players.filter(p=>p.odId!==odId);saveData();renderTablePage();toast('بازیکن از میز حذف شد','info')}})}
function confirmEndGame(){const g=getActiveGame();if(!g)return;const uc=g.players.filter(p=>!p.cashedOut);if(uc.length>0){showModal(`<h3>⚠️ بازیکنان فعال</h3><div class="balance-box balance-warn" style="text-align:right"><p style="margin-bottom:8px"><strong>${uc.length} بازیکن</strong> هنوز خروج ثبت نکرده:</p><p style="font-size:13px">${uc.map(p=>'• '+p.name+' (خرید: '+fmt(p.buyIns.reduce((s,b)=>s+b.amount,0))+')').join('<br>')}</p></div><p style="font-size:13px;color:var(--text2);margin:12px 0">اگر بازی را ببندید، خروجی بازیکنان فعال <strong style="color:var(--red)">صفر</strong> ثبت می‌شود و کل خریدشان ضرر محسوب خواهد شد.</p><div class="btn-group" style="flex-direction:column"><button class="btn btn-danger btn-block" onclick="forceEndGame()">⚠️ بستن اجباری بازی</button><button class="btn btn-secondary btn-block" onclick="hideModal()">بازگشت و ادامه بازی</button></div>`);return}const totalBI=g.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);const totalCO=g.players.reduce((s,p)=>s+(p.cashOutAmount||0),0);const commAmt=getCommissionAmount(g);const diff=totalBI-totalCO-commAmt;let balHtml='';if(diff===0)balHtml=`<div class="balance-box balance-ok">✅ حساب‌ها دقیقاً منطبق است</div>`;else if(diff>0)balHtml=`<div class="balance-box balance-warn">⚠️ <span class="num">${fmt(diff)}</span> ${getCurrency()} پول کم آمده!</div>`;else balHtml=`<div class="balance-box balance-warn">⚠️ <span class="num">${fmt(Math.abs(diff))}</span> ${getCurrency()} پول اضافه خارج شده!</div>`;let commHtml='';if(g.commission&&g.commission.enabled)commHtml=`<div class="commission-box" style="text-align:right"><div class="comm-label">💰 کانیات: ${getCommissionLabel(g)}</div><div class="comm-value"><span class="num">${fmt(commAmt)}</span> ${getCurrency()}</div></div>`;let infoHtml=`<div class="info-box"><div class="info-row"><span class="label">کل ورودی</span><span class="value num">${fmt(totalBI)} ${getCurrency()}</span></div><div class="info-row"><span class="label">کل خروجی بازیکنان</span><span class="value num">${fmt(totalCO)} ${getCurrency()}</span></div>${g.commission&&g.commission.enabled?`<div class="info-row"><span class="label">کانیات</span><span class="value num">${fmt(commAmt)} ${getCurrency()}</span></div>`:''}<div class="info-row"><span class="label">تفاوت</span><span class="value num" style="color:var(--${diff===0?'green':'red'})">${diff===0?'0':fmtSign(-diff)} ${getCurrency()}</span></div></div>`;showModal(`<h3>⏹ پایان بازی</h3>${infoHtml}${commHtml}${balHtml}<p style="margin:16px 0;text-align:center;color:var(--text2)">آیا بازی را پایان می‌دهید؟</p><div class="btn-group" style="flex-direction:column"><button class="btn btn-danger btn-block" onclick="endGame()">بله، پایان بازی</button><button class="btn btn-secondary btn-block" onclick="hideModal()">انصراف</button></div>`)}
function forceEndGame(){const g=getActiveGame();if(!g)return;g.players.forEach(p=>{if(!p.cashedOut){p.cashedOut=true;p.cashOutAmount=0;p.cashOutTime=Date.now()}});g.status='closed';g.endTime=Date.now();data.activeGameId=null;saveData();hideModal();showSettlement(g.id)}
function endGame(){const g=getActiveGame();if(!g)return;g.status='closed';g.endTime=Date.now();data.activeGameId=null;saveData();hideModal();showSettlement(g.id)}
function calculateSettlements(game){const results=[];game.players.forEach(p=>{const tb=p.buyIns.reduce((s,b)=>s+b.amount,0);results.push({name:p.name,playerId:p.playerId,buyIn:tb,cashOut:p.cashOutAmount||0,profit:(p.cashOutAmount||0)-tb})});const debtors=[],creditors=[];results.forEach(r=>{if(r.profit<0)debtors.push({name:r.name,amount:Math.abs(r.profit)});else if(r.profit>0)creditors.push({name:r.name,amount:r.profit})});debtors.sort((a,b)=>b.amount-a.amount);creditors.sort((a,b)=>b.amount-a.amount);const settlements=[];let i=0,j=0;while(i<debtors.length&&j<creditors.length){const amt=Math.min(debtors[i].amount,creditors[j].amount);if(amt>0)settlements.push({from:debtors[i].name,to:creditors[j].name,amount:amt});debtors[i].amount-=amt;creditors[j].amount-=amt;if(debtors[i].amount<=0)i++;if(creditors[j].amount<=0)j++}return{results,settlements}}
function showSettlement(gid){const game=data.games.find(g=>g.id===gid);if(!game)return;const{results,settlements}=calculateSettlements(game);const totalBI=game.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);const totalCO=game.players.reduce((s,p)=>s+(p.cashOutAmount||0),0);const commAmt=getCommissionAmount(game);const diff=totalBI-totalCO-commAmt;let html=`<div class="widget"><div class="widget-header"><span class="widget-title">📊 نتایج</span></div><div class="info-box"><div class="info-row"><span class="label">تاریخ</span><span class="value">${getDateStr(game.startTime)}</span></div><div class="info-row"><span class="label">مدت</span><span class="value">${durationStr(game.startTime,game.endTime)}</span></div>${game.location?`<div class="info-row"><span class="label">مکان</span><span class="value">${game.location}</span></div>`:''}<div class="info-row"><span class="label">کل ورودی</span><span class="value num">${fmt(totalBI)} ${getCurrency()}</span></div><div class="info-row"><span class="label">کل خروجی</span><span class="value num">${fmt(totalCO)} ${getCurrency()}</span></div>`;if(game.commission&&game.commission.enabled)html+=`<div class="info-row"><span class="label">💰 کانیات (${getCommissionLabel(game)})</span><span class="value num" style="color:var(--gold)">${fmt(commAmt)} ${getCurrency()}</span></div>`;html+=`</div>`;if(diff===0)html+=`<div class="balance-box balance-ok">✅ حساب‌ها منطبق</div>`;else if(diff>0)html+=`<div class="balance-box balance-warn">⚠️ <span class="num">${fmt(diff)}</span> ${getCurrency()} کم آمده</div>`;else html+=`<div class="balance-box balance-warn">⚠️ <span class="num">${fmt(Math.abs(diff))}</span> ${getCurrency()} اضافه خارج شده</div>`;html+=`</div>`;if(game.commission&&game.commission.enabled){html+=`<div class="commission-box"><div class="comm-label">💰 کانیات صاحب میز</div><div class="comm-value"><span class="num">${fmt(commAmt)}</span> ${getCurrency()}</div><div style="font-size:11px;color:var(--text3);margin-top:4px">${getCommissionLabel(game)} · از کل گردش <span class="num">${fmt(totalBI)}</span></div></div>`}html+=`<div class="section-title">📊 عملکرد</div>`;results.sort((a,b)=>b.profit-a.profit).forEach(r=>{const pc=r.profit>0?'green':r.profit<0?'red':'gray';html+=`<div class="player-card"><div class="player-avatar" style="color:var(--${r.profit>0?'green':r.profit<0?'red':'text2'})">${r.profit>0?'▲':r.profit<0?'▼':'●'}</div><div class="player-info"><div class="player-name">${r.name}</div><div class="player-meta">خرید: <span class="num">${fmt(r.buyIn)}</span> · خروج: <span class="num">${fmt(r.cashOut)}</span></div></div><div class="player-amount ${pc}"><span class="num">${fmtSign(r.profit)}</span></div></div>`});if(settlements.length>0){html+=`<div class="section-title" style="margin-top:20px">💸 تسویه</div><p style="font-size:12px;color:var(--text2);margin-bottom:10px">چه کسی به چه کسی:</p>`;settlements.forEach(s=>{html+=`<div class="settlement-item"><span style="font-weight:600;color:var(--red)">${s.from}</span><span class="settlement-arrow">→</span><span style="font-weight:600;color:var(--green)">${s.to}</span><span class="settlement-amount"><span class="num">${fmt(s.amount)}</span> ${getCurrency()}</span></div>`})}html+=`<div style="margin-top:20px"><button class="btn btn-secondary btn-block" onclick="generatePDF('${gid}')" style="margin-bottom:8px">📄 PDF</button><button class="btn btn-outline btn-block" onclick="closeSubPage('sub-settlement')">بستن</button></div>`;document.getElementById('settlement-content').innerHTML=html;openSubPage('sub-settlement')}
function generatePDF(gid){const game=data.games.find(g=>g.id===gid);if(!game)return;const{jsPDF}=window.jspdf;const doc=new jsPDF();const{results,settlements}=calculateSettlements(game);const commAmt=getCommissionAmount(game);const totalBI=game.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);const totalCO=game.players.reduce((s,p)=>s+(p.cashOutAmount||0),0);const diff=totalBI-totalCO-commAmt;let y=20;doc.setFontSize(20);doc.setFont('helvetica','bold');doc.text('Poker Game Report',105,y,{align:'center'});y+=15;doc.setFontSize(11);doc.setFont('helvetica','normal');doc.text(`Date: ${getDateStrEn(game.startTime)}`,20,y);y+=7;doc.text(`Start: ${getTimeStr(game.startTime)}`,20,y);if(game.endTime)doc.text(`End: ${getTimeStr(game.endTime)}`,100,y);y+=7;if(game.location){doc.text(`Location: ${persianToFinglish(game.location)}`,20,y);y+=7}doc.text(`Players: ${game.players.length}`,20,y);y+=7;doc.text(`Total Buy-ins: ${fmt(totalBI)}`,20,y);y+=7;doc.text(`Total Cash-outs: ${fmt(totalCO)}`,20,y);y+=7;if(game.commission&&game.commission.enabled){doc.text(`Commission: ${fmt(commAmt)}`,20,y);y+=7}if(diff!==0){doc.setTextColor(255,0,0);doc.text(`Balance Discrepancy: ${diff>0?'-':'+'} ${fmt(Math.abs(diff))}`,20,y);doc.setTextColor(0,0,0);y+=7}else{doc.setTextColor(0,128,0);doc.text('Balance: OK',20,y);doc.setTextColor(0,0,0);y+=7}y+=5;doc.setFontSize(14);doc.setFont('helvetica','bold');doc.text('Player Results',20,y);y+=8;const td=results.sort((a,b)=>b.profit-a.profit).map(r=>[persianToFinglish(r.name),fmt(r.buyIn),fmt(r.cashOut),(r.profit>=0?'+':'')+fmt(r.profit),r.profit>0?'WIN':r.profit<0?'LOSS':'EVEN']);doc.autoTable({startY:y,head:[['Player','Buy-in','Cash-out','P/L','Result']],body:td,theme:'grid',headStyles:{fillColor:[27,122,48],textColor:255,fontStyle:'bold'},styles:{halign:'center',fontSize:10},columnStyles:{0:{halign:'left'}}});y=doc.lastAutoTable.finalY+15;if(settlements.length>0){doc.setFontSize(14);doc.setFont('helvetica','bold');doc.text('Settlements',20,y);y+=8;const sd=settlements.map(s=>[persianToFinglish(s.from),'-->',persianToFinglish(s.to),fmt(s.amount)]);doc.autoTable({startY:y,head:[['From','','To','Amount']],body:sd,theme:'grid',headStyles:{fillColor:[210,153,34],textColor:0,fontStyle:'bold'},styles:{halign:'center',fontSize:10}})}doc.setFontSize(8);doc.setFont('helvetica','italic');doc.text('Poker Manager Pro v2.0',105,doc.internal.pageSize.height-10,{align:'center'});doc.save(`poker-${getDateStrEn(game.startTime).replace(/[^a-zA-Z0-9]/g,'-')}.pdf`)}
function renderPlayersPage(){const el=document.getElementById('players-list');const search=(document.getElementById('player-search')?.value||'').trim().toLowerCase();let players=data.players.map(p=>({...p,stats:getPlayerStats(p.id)}));if(search)players=players.filter(p=>p.name.toLowerCase().includes(search));players.sort((a,b)=>b.stats.totalProfit-a.stats.totalProfit);if(!players.length){el.innerHTML=`<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">👥</div><p>${search?'یافت نشد':'بازیکنی ثبت نشده'}</p></div>`;return}let html='';players.forEach(p=>{const s=p.stats;const pc=s.totalProfit>0?'green':s.totalProfit<0?'red':'gray';const wr=s.totalGames>0?Math.round(s.wins/s.totalGames*100):0;html+=`<div class="player-card" onclick="openPlayerProfile('${p.id}')"><div class="player-avatar">${p.name.charAt(0)}</div><div class="player-info"><div class="player-name">${p.name}</div><div class="player-meta">${s.totalGames} بازی · ${wr}% برد</div></div><div class="player-amount ${pc}"><span class="num">${s.totalGames>0?fmtSign(s.totalProfit):'-'}</span></div></div>`});el.innerHTML=html}

function openPlayerProfile(pid,filter){if(!pid)return;currentProfilePlayerId=pid;if(filter!==undefined)profileFilter=filter;const player=getPlayerById(pid);if(!player)return;let startDate=null,endDate=null;if(profileFilter==='custom'){startDate=profileCustomStart;endDate=profileCustomEnd}else if(profileFilter!=='all'){const range=getDateRange(profileFilter);startDate=range.start;endDate=range.end}const stats=getPlayerStats(pid,startDate,endDate);const wr=stats.totalGames>0?Math.round(stats.wins/stats.totalGames*100):0;const avg=stats.totalGames>0?Math.round(stats.totalBuyIn/stats.totalGames):0;const pc=stats.totalProfit>0?'green':stats.totalProfit<0?'red':'';document.getElementById('profile-title').textContent=player.name;const fL={all:'کلی',tonight:'امشب',week:'این هفته',month:'این ماه',year:'امسال',custom:'دلخواه'};let html=`<div class="widget" style="text-align:center"><div class="player-avatar" style="width:64px;height:64px;font-size:28px;margin:0 auto 12px">${player.name.charAt(0)}</div><h2 style="font-weight:700;color:#fff">${player.name}</h2><div style="margin-top:8px"><span class="chip ${stats.totalProfit>=0?'chip-green':'chip-red'}">${stats.totalProfit>=0?'سودده':'ضررده'}</span></div></div>`;html+=`<div class="widget"><div class="widget-title" style="margin-bottom:10px">📅 بازه زمانی آمار</div><div class="filter-chips">`;['all','tonight','week','month','year','custom'].forEach(f=>{html+=`<button class="filter-chip ${profileFilter===f?'active':''}" onclick="setProfileFilter('${f}')">${fL[f]}</button>`});html+=`</div>`;if(profileFilter==='custom'){const sV=profileCustomStart?tsToJalaliStr(profileCustomStart):'تاریخ شروع';const eV=profileCustomEnd?tsToJalaliStr(profileCustomEnd):'تاریخ پایان';html+=`<div style="display:flex;gap:8px;margin-bottom:8px"><div style="flex:1"><label class="form-label">از تاریخ</label><button class="form-input" style="text-align:right;cursor:pointer" onclick="openDatePicker('profileStart',profileCustomStart,function(s){profileCustomStart=jalaliStrToTs(s,false);refreshProfile()})">${sV}</button></div><div style="flex:1"><label class="form-label">تا تاریخ</label><button class="form-input" style="text-align:right;cursor:pointer" onclick="openDatePicker('profileEnd',profileCustomEnd,function(s){profileCustomEnd=jalaliStrToTs(s,true);refreshProfile()})">${eV}</button></div></div>`}html+=`<div style="font-size:12px;color:var(--text2);text-align:center">نمایش آمار: ${fL[profileFilter]}</div></div>`;html+=`<div class="stat-row"><div class="stat-box"><div class="stat-value blue">${stats.totalGames}</div><div class="stat-label">کل بازی‌ها</div></div><div class="stat-box"><div class="stat-value green">${stats.wins}</div><div class="stat-label">برد</div></div><div class="stat-box"><div class="stat-value red">${stats.losses}</div><div class="stat-label">باخت</div></div></div><div class="stat-row"><div class="stat-box"><div class="stat-value ${pc}"><span class="num">${fmtSign(stats.totalProfit)}</span></div><div class="stat-label">سود/زیان (${getCurrency()})</div></div><div class="stat-box"><div class="stat-value">${wr}%</div><div class="stat-label">نرخ برد</div></div><div class="stat-box"><div class="stat-value"><span class="num">${fmt(avg)}</span></div><div class="stat-label">میانگین خرید</div></div></div>`;if(stats.totalGames>0){html+=`<div class="stat-row"><div class="stat-box"><div class="stat-value"><span class="num">${fmt(stats.totalBuyIn)}</span></div><div class="stat-label">کل خرید</div></div><div class="stat-box"><div class="stat-value"><span class="num">${fmt(stats.totalCashOut)}</span></div><div class="stat-label">کل خروج</div></div></div>`}if(stats.history.length>0){html+=`<div class="section-title" style="margin-top:20px">📋 تاریخچه (${stats.history.length} بازی)</div>`;stats.history.sort((a,b)=>b.date-a.date).forEach(h=>{const hc=h.profit>0?'green':h.profit<0?'red':'gray';html+=`<div class="player-card" onclick="openGameDetail('${h.gameId}')"><div class="player-info"><div class="player-name">${getDateStr(h.date)}</div><div class="player-meta">خرید: <span class="num">${fmt(h.buyIn)}</span> · خروج: <span class="num">${fmt(h.cashOut)}</span></div></div><div class="player-amount ${hc}"><span class="num">${fmtSign(h.profit)}</span></div></div>`})}else{html+=`<div class="empty-state" style="padding:20px"><p>بازی‌ای در این بازه یافت نشد</p></div>`}html+=`<div style="margin-top:20px;display:flex;flex-direction:column;gap:8px"><button class="btn btn-secondary btn-block" onclick="editPlayerName('${pid}')">✏️ ویرایش نام</button><button class="btn btn-danger btn-block" onclick="deletePlayer('${pid}')">🗑 حذف بازیکن</button></div>`;document.getElementById('profile-content').innerHTML=html;openSubPage('sub-player-profile')}

function editPlayerName(pid){const player=getPlayerById(pid);if(!player)return;showModal(`<h3>✏️ ویرایش نام</h3><div class="form-group"><label class="form-label">نام جدید</label><input class="form-input" id="edit-player-name" value="${player.name}"></div><button class="btn btn-primary btn-block" onclick="confirmEditPlayer('${pid}')">💾 ذخیره</button>`)}

function getFilteredGames(){let cg=data.games.filter(g=>g.status==='closed');if(historySearch){const q=historySearch.toLowerCase();cg=cg.filter(g=>{if(g.location&&g.location.toLowerCase().includes(q))return true;if(g.players.some(p=>p.name.toLowerCase().includes(q)))return true;const ds=getDateStr(g.startTime).toLowerCase();if(ds.includes(q))return true;return false})}let startDate=null,endDate=null;if(historyFilter==='custom'){startDate=historyCustomStart;endDate=historyCustomEnd}else if(historyFilter!=='all'){const range=getDateRange(historyFilter);startDate=range.start;endDate=range.end}if(startDate)cg=cg.filter(g=>g.startTime>=startDate);if(endDate)cg=cg.filter(g=>g.startTime<=endDate);return cg.sort((a,b)=>b.startTime-a.startTime)}
function renderHistoryPage(){const el=document.getElementById('history-content');const fL={all:'همه',tonight:'امشب',week:'این هفته',month:'این ماه',year:'امسال',custom:'دلخواه'};let html=`<div class="widget"><div class="widget-header"><span class="widget-title">📈 آمار تحلیلی</span></div><div class="chart-container"><canvas id="history-chart"></canvas></div></div>`;html+=`<div class="section-title">🔍 جستجو و فیلتر</div><div class="search-box"><input type="text" id="history-search" placeholder="جستجو: مکان، بازیکن، تاریخ..." value="${historySearch}" oninput="historySearch=this.value;renderHistoryPage()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><div class="filter-chips">`;['all','tonight','week','month','year','custom'].forEach(f=>{html+=`<button class="filter-chip ${historyFilter===f?'active':''}" onclick="setHistoryFilter('${f}')">${fL[f]}</button>`});html+=`</div>`;if(historyFilter==='custom'){const sV=historyCustomStart?tsToJalaliStr(historyCustomStart):'تاریخ شروع';const eV=historyCustomEnd?tsToJalaliStr(historyCustomEnd):'تاریخ پایان';html+=`<div style="display:flex;gap:8px;margin-bottom:16px"><div style="flex:1"><label class="form-label">از تاریخ</label><button class="form-input" style="text-align:right;cursor:pointer" onclick="openDatePicker('histStart',historyCustomStart,function(s){historyCustomStart=jalaliStrToTs(s,false);renderHistoryPage()})">${sV}</button></div><div style="flex:1"><label class="form-label">تا تاریخ</label><button class="form-input" style="text-align:right;cursor:pointer" onclick="openDatePicker('histEnd',historyCustomEnd,function(s){historyCustomEnd=jalaliStrToTs(s,true);renderHistoryPage()})">${eV}</button></div></div>`}const cg=getFilteredGames();const allGames=data.games.filter(g=>g.status==='closed');html+=`<div class="section-title">📋 تاریخچه (${cg.length}${cg.length!==allGames.length?' از '+allGames.length:''})</div>`;if(!cg.length)html+=`<div class="empty-state"><p>${historySearch||historyFilter!=='all'?'نتیجه‌ای یافت نشد':'بازی‌ای ثبت نشده'}</p></div>`;else cg.forEach(g=>{const tb=g.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);const commAmt=getCommissionAmount(g);html+=`<div class="card" onclick="openGameDetail('${g.id}')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:700;color:#fff">${getDateStr(g.startTime)}</span><span class="chip chip-gold">${g.players.length} بازیکن</span></div><div style="font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap"><span>⏱ ${durationStr(g.startTime,g.endTime)}</span><span>💰 <span class="num">${fmt(tb)}</span></span>${g.location?`<span>📍 ${g.location}</span>`:''}${g.commission&&g.commission.enabled?`<span style="color:var(--gold)">🏦 ${fmt(commAmt)}</span>`:''}</div></div>`});el.innerHTML=html;setTimeout(()=>renderHistoryChart(allGames),100)}
function setHistoryFilter(f){historyFilter=f;if(f!=='custom'){historyCustomStart=null;historyCustomEnd=null}renderHistoryPage()}
function renderHistoryChart(games){const canvas=document.getElementById('history-chart');if(!canvas||!games.length)return;const md={};games.forEach(g=>{const d=new Date(g.startTime);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;if(!md[k])md[k]={totalMoney:0};md[k].totalMoney+=g.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0)});const labels=Object.keys(md).sort();const money=labels.map(k=>md[k].totalMoney);if(window.historyChart)window.historyChart.destroy();window.historyChart=new Chart(canvas,{type:'bar',data:{labels,datasets:[{label:'گردش مالی ('+getCurrency()+')',data:money,backgroundColor:'rgba(63,185,80,0.5)',borderColor:'#3fb950',borderWidth:1,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b949e'}},tooltip:{callbacks:{label:function(ctx){return fmt(ctx.raw)+' '+getCurrency()}}}},scales:{x:{ticks:{color:'#6e7681'},grid:{color:'rgba(48,54,61,0.5)'}},y:{ticks:{color:'#6e7681',callback:function(v){return fmt(v)}},grid:{color:'rgba(48,54,61,0.5)'}}}}})}
function openGameDetail(gid){const game=data.games.find(g=>g.id===gid);if(!game)return;const{results,settlements}=calculateSettlements(game);const tbi=game.players.reduce((s,p)=>s+p.buyIns.reduce((ss,b)=>ss+b.amount,0),0);const tco=game.players.reduce((s,p)=>s+(p.cashOutAmount||0),0);const commAmt=getCommissionAmount(game);const diff=tbi-tco-commAmt;document.getElementById('game-detail-title').textContent='بازی '+getDateStrShort(game.startTime);let html=`<div class="widget"><div class="info-box"><div class="info-row"><span class="label">📅 تاریخ</span><span class="value">${getDateStr(game.startTime)}</span></div><div class="info-row"><span class="label">🕐 شروع</span><span class="value num">${getTimeStr(game.startTime)}</span></div>${game.endTime?`<div class="info-row"><span class="label">🕐 پایان</span><span class="value num">${getTimeStr(game.endTime)}</span></div>`:''}<div class="info-row"><span class="label">⏱ مدت</span><span class="value">${durationStr(game.startTime,game.endTime)}</span></div>${game.location?`<div class="info-row"><span class="label">📍 مکان</span><span class="value">${game.location}</span></div>`:''}</div><div class="stat-row" style="margin-top:10px"><div class="stat-box"><div class="stat-value blue">${game.players.length}</div><div class="stat-label">بازیکنان</div></div><div class="stat-box"><div class="stat-value"><span class="num">${fmt(tbi)}</span></div><div class="stat-label">خرید</div></div><div class="stat-box"><div class="stat-value"><span class="num">${fmt(tco)}</span></div><div class="stat-label">خروج</div></div></div>`;if(game.commission&&game.commission.enabled){html+=`<div class="commission-box"><div class="comm-label">💰 کانیات (${getCommissionLabel(game)})</div><div class="comm-value"><span class="num">${fmt(commAmt)}</span> ${getCurrency()}</div></div>`}if(game.status==='closed'){if(diff===0)html+=`<div class="balance-box balance-ok">✅ حساب‌ها منطبق</div>`;else if(diff>0)html+=`<div class="balance-box balance-warn">⚠️ <span class="num">${fmt(diff)}</span> ${getCurrency()} کم آمده</div>`;else html+=`<div class="balance-box balance-warn">⚠️ <span class="num">${fmt(Math.abs(diff))}</span> ${getCurrency()} اضافه خارج شده</div>`}html+=`</div>`;html+=`<div class="section-title">📊 عملکرد</div>`;results.sort((a,b)=>b.profit-a.profit).forEach(r=>{const pc=r.profit>0?'green':r.profit<0?'red':'gray';html+=`<div class="player-card" onclick="openPlayerProfile('${r.playerId||''}')"><div class="player-avatar" style="color:var(--${r.profit>0?'green':r.profit<0?'red':'text2'})">${r.profit>0?'▲':r.profit<0?'▼':'●'}</div><div class="player-info"><div class="player-name">${r.name}</div><div class="player-meta">خرید: <span class="num">${fmt(r.buyIn)}</span> · خروج: <span class="num">${fmt(r.cashOut)}</span></div></div><div class="player-amount ${pc}"><span class="num">${fmtSign(r.profit)}</span></div></div>`});if(settlements.length>0){html+=`<div class="section-title" style="margin-top:16px">💸 تسویه</div>`;settlements.forEach(s=>{html+=`<div class="settlement-item"><span style="font-weight:600;color:var(--red)">${s.from}</span><span class="settlement-arrow">→</span><span style="font-weight:600;color:var(--green)">${s.to}</span><span class="settlement-amount"><span class="num">${fmt(s.amount)}</span></span></div>`})}html+=`<div style="margin-top:20px"><button class="btn btn-secondary btn-block" onclick="generatePDF('${gid}')" style="margin-bottom:8px">📄 خروجی PDF</button><button class="btn btn-danger btn-block" onclick="deleteGame('${gid}')" style="margin-bottom:8px">🗑 حذف این تاریخچه</button></div>`;document.getElementById('game-detail-content').innerHTML=html;openSubPage('sub-game-detail')}
function renderSettingsPage(){
  const s=data.settings;
  const el=document.getElementById('settings-content');
  const currencies=[['تومان','تومان'],['ریال','ریال'],['دلار','دلار'],['یورو','یورو'],['$','$'],['€','€']];
  let html='';

  /* ===== Group 1: Appearance ===== */
  html+=`<div class="settings-group">
    <div class="settings-group-header">
      <div class="settings-group-icon">🎨</div>
      <div class="settings-group-title">ظاهر و نمایش</div>
    </div>
    <div class="setting-item">
      <h4>💱 واحد پول</h4>
      <p>واحد نمایشی مبالغ در کل اپ</p>
      <select class="form-input mt-3" onchange="data.settings.currency=this.value;saveData();toast('واحد پول بروزرسانی شد','success')">
        ${currencies.map(([v,l])=>`<option value="${v}" ${s.currency===v?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    <div class="setting-item">
      <h4>🧩 ویجت‌های داشبورد</h4>
      <p>انتخاب اینکه چه بخش‌هایی در صفحه خانه نمایش داده شوند</p>
      <div class="mt-3">
        <div class="toggle-row">
          <div>
            <span class="toggle-label">📅 تاریخ و ساعت</span>
            <div class="toggle-desc">ویجت بالای داشبورد</div>
          </div>
          <div class="toggle ${s.widgets.dateTime?'on':''}" onclick="toggleWidget('dateTime',this)"></div>
        </div>
        <div class="toggle-row">
          <div>
            <span class="toggle-label">🕐 نمایش ساعت به صورت آنالوگ</span>
            <div class="toggle-desc">عقربه‌ای به جای دیجیتال</div>
          </div>
          <div class="toggle ${s.clockType==='analog'?'on':''}" onclick="toggleClockType(this)"></div>
        </div>
        <div class="toggle-row">
          <div>
            <span class="toggle-label">📈 خلاصه آمار</span>
            <div class="toggle-desc">تعداد بازی‌ها، بازیکنان، گردش مالی</div>
          </div>
          <div class="toggle ${s.widgets.statsSummary?'on':''}" onclick="toggleWidget('statsSummary',this)"></div>
        </div>
        <div class="toggle-row">
          <div>
            <span class="toggle-label">🏆 برترین بازیکنان</span>
            <div class="toggle-desc">رتبه‌بندی بر اساس سود کلی</div>
          </div>
          <div class="toggle ${s.widgets.topPlayers?'on':''}" onclick="toggleWidget('topPlayers',this)"></div>
        </div>
        <div class="toggle-row">
          <div>
            <span class="toggle-label">📝 یادداشت‌ها</span>
            <div class="toggle-desc">محل ثبت یادداشت‌های شخصی</div>
          </div>
          <div class="toggle ${s.widgets.notes?'on':''}" onclick="toggleWidget('notes',this)"></div>
        </div>
      </div>
    </div>
  </div>`;

  /* ===== Group 2: Game Defaults ===== */
  html+=`<div class="settings-group">
    <div class="settings-group-header">
      <div class="settings-group-icon">🎮</div>
      <div class="settings-group-title">پیش‌فرض‌های بازی</div>
    </div>
    <div class="setting-item">
      <h4>💰 مبلغ پیش‌فرض ورودی</h4>
      <p>مبلغ اولیه پیشنهادی هنگام ساخت میز جدید</p>
      <input class="form-input mt-3" type="number" value="${s.defaultBuyIn}" style="direction:ltr" onchange="data.settings.defaultBuyIn=parseInt(this.value)||0;saveData();toast('ذخیره شد','success')">
    </div>
    <div class="setting-item">
      <h4>📏 سقف لغزاننده مبالغ</h4>
      <p>بیشترین مقدار قابل انتخاب در اسلایدر خرید/خروج</p>
      <input class="form-input mt-3" type="number" value="${s.sliderMax}" style="direction:ltr" onchange="data.settings.sliderMax=parseInt(this.value)||100000000;saveData();toast('ذخیره شد','success')">
    </div>
    <div class="setting-item">
      <h4>⏭ گام لغزاننده</h4>
      <p>کمترین واحد افزایش/کاهش در اسلایدر</p>
      <input class="form-input mt-3" type="number" value="${s.sliderStep}" style="direction:ltr" onchange="data.settings.sliderStep=parseInt(this.value)||500000;saveData();toast('ذخیره شد','success')">
    </div>
  </div>`;

  /* ===== Group 3: Quick Amounts ===== */
  html+=`<div class="settings-group">
    <div class="settings-group-header">
      <div class="settings-group-icon">⚡</div>
      <div class="settings-group-title">مبالغ میانبر</div>
    </div>
    <div class="setting-item">
      <h4>مبالغ پیش‌فرض</h4>
      <p>دکمه‌های میانبر که زیر لغزاننده خرید و خروج نشان داده می‌شوند</p>
      <div id="qa-list" class="mt-3">`;
  s.quickAmounts.forEach((a,i)=>{
    html+=`<div class="qa-item">
      <input type="number" value="${a}" style="direction:ltr" onchange="updateQuickAmount(${i},parseInt(this.value))">
      <button class="qa-remove" onclick="removeQuickAmount(${i})" aria-label="حذف">×</button>
    </div>`;
  });
  html+=`</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input class="form-input" id="new-qa-value" type="number" placeholder="مبلغ جدید..." style="direction:ltr;flex:1">
        <button class="btn btn-primary" onclick="addQuickAmount()" style="padding:14px 18px;flex-shrink:0">+ افزودن</button>
      </div>
      <div class="mt-4">
        <div class="form-label">پیش‌نمایش روی میز:</div>
        <div class="quick-amounts mt-2">
          ${s.quickAmounts.map(a=>`<span class="quick-amt" style="cursor:default">${fmt(a)}</span>`).join('')}
        </div>
      </div>
    </div>
  </div>`;

  /* ===== Group 4: Security ===== */
  const pwOn=isPasswordSet();
  html+=`<div class="settings-group">
    <div class="settings-group-header">
      <div class="settings-group-icon">🔐</div>
      <div class="settings-group-title">امنیت و حریم خصوصی</div>
    </div>
    <div class="setting-item">
      <h4>${pwOn?'🔒 رمز عبور فعال است':'🔓 رمز عبور غیرفعال'}</h4>
      <p>${pwOn?'برای ورود به اپ رمز خواسته می‌شود. می‌توانید آن را تغییر دهید یا غیرفعال کنید.':'با تنظیم رمز عبور، ورود به اپ مشروط به وارد کردن رمز می‌شود.'}</p>
      <div class="flex-col gap-2 mt-3">
        ${pwOn
          ? `<button class="btn btn-secondary btn-block" onclick="openChangePasswordModal()">🔑 تغییر رمز عبور</button>
             <button class="btn btn-secondary btn-block" onclick="lockNow()">🔒 قفل کردن صفحه</button>
             <button class="btn btn-danger btn-block" onclick="openDisablePasswordModal()">حذف رمز عبور</button>`
          : `<button class="btn btn-primary btn-block" onclick="openSetPasswordModal()">🔒 تنظیم رمز عبور</button>`
        }
      </div>
    </div>
  </div>`;

  /* ===== Group 5: Data Management ===== */
  html+=`<div class="settings-group">
    <div class="settings-group-header">
      <div class="settings-group-icon">💾</div>
      <div class="settings-group-title">مدیریت داده‌ها</div>
    </div>
    <div class="setting-item">
      <h4>بکاپ و بازگردانی</h4>
      <p>داده‌ها فقط روی این دستگاه ذخیره می‌شوند. برای انتقال یا نگهداری، از بکاپ استفاده کنید.</p>
      <div class="flex-col gap-2 mt-3">
        <button class="btn btn-secondary btn-block" onclick="exportData()">📤 خروجی بکاپ (JSON)</button>
        <button class="btn btn-secondary btn-block" onclick="document.getElementById('import-file').click()">📥 بازگردانی از بکاپ</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>
    <div class="setting-item">
      <h4 style="color:var(--red)">⚠️ منطقه خطر</h4>
      <p>حذف تمام بازیکنان، بازی‌ها و تنظیمات. این عمل بازگشت‌پذیر نیست.</p>
      <button class="btn btn-danger btn-block mt-3" onclick="resetAllData()">🗑 حذف تمام داده‌ها</button>
    </div>
  </div>`;

  /* ===== Group 6: About ===== */
  html+=`<div class="settings-group">
    <div class="settings-group-header">
      <div class="settings-group-icon">ℹ️</div>
      <div class="settings-group-title">درباره</div>
    </div>
    <div class="setting-item text-center">
      <div style="font-size:48px;margin-bottom:8px;line-height:1">🎰</div>
      <h4 style="margin-bottom:6px">پوکر منیجر پرو</h4>
      <p style="color:var(--text3);font-size:11px">نسخه ۲٫۰ · ساخته‌شده برای بازی‌های خانگی</p>
    </div>
  </div>
  <div style="height:24px"></div>`;

  el.innerHTML=html;
}
function toggleWidget(k,el){data.settings.widgets[k]=!data.settings.widgets[k];el.classList.toggle('on');saveData()}
function toggleClockType(el){data.settings.clockType=data.settings.clockType==='analog'?'digital':'analog';el.classList.toggle('on');saveData()}
function updateQuickAmount(idx,val){if(!isNaN(val)&&val>=0){data.settings.quickAmounts[idx]=val;data.settings.quickAmounts.sort((a,b)=>a-b);saveData();renderSettingsPage()}}
function removeQuickAmount(idx){if(data.settings.quickAmounts.length<=1){toast('حداقل یک مبلغ باید وجود داشته باشد','warn');return}data.settings.quickAmounts.splice(idx,1);saveData();renderSettingsPage()}
function addQuickAmount(){const raw=document.getElementById('new-qa-value').value;if(raw===''){toast('مبلغ معتبر نیست','error');return}const v=parseInt(raw);if(isNaN(v)||v<0){toast('مبلغ معتبر نیست','error');return}if(data.settings.quickAmounts.includes(v)){toast('این مبلغ قبلاً اضافه شده است','warn');return}data.settings.quickAmounts.push(v);data.settings.quickAmounts.sort((a,b)=>a-b);saveData();renderSettingsPage();toast('مبلغ اضافه شد','success')}
function exportData(){const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`poker-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u)}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const imp=JSON.parse(ev.target.result);if(imp.players&&imp.games){confirmDialog({title:'جایگزینی داده‌ها؟',message:'داده‌های فعلی با محتوای فایل بکاپ جایگزین خواهند شد. پیش از ادامه حتماً یک بکاپ از داده‌های فعلی بگیرید.',confirmText:'جایگزین کن',cancelText:'انصراف',danger:true,icon:'📥',onConfirm:()=>{data=imp;saveData();location.reload()}})}else{toast('فایل بکاپ نامعتبر است','error')}}catch(er){toast('خطا در خواندن فایل','error')}};r.readAsText(f);e.target.value=''}
function resetAllData(){confirmDialog({title:'حذف تمام داده‌ها؟',message:'تمام بازیکنان، بازی‌ها، تاریخچه و تنظیمات شما پاک خواهند شد.',confirmText:'ادامه',cancelText:'انصراف',danger:true,icon:'🗑',onConfirm:()=>{confirmDialog({title:'کاملاً مطمئنید؟',message:'این عمل <strong>غیرقابل بازگشت</strong> است. پیش از ادامه، حتماً یک بکاپ تهیه کنید.',confirmText:'بله، همه را حذف کن',cancelText:'انصراف',danger:true,icon:'⚠️',onConfirm:()=>{localStorage.removeItem('pokerManagerData');location.reload()}})}})}
loadData();
if(isPasswordSet()){showLockScreen();}else{renderDashboard();}
</script>
</body>
</html>
